<!-- AboutMe -->
<section class="page-section" id="about">
<div class="container">
  <div class="row">
	<div class="col-lg-12 text-center">
	  <h2 class="section-heading text-uppercase">{{ site.data.me.title }}</h2>
	  <!-- <h3 class="section-subheading text-muted">{{ site.data.me.text }}</h3> -->
	</div>
  </div>
  <div class="row d-flex justify-content-center">
	<div class="col-sm-4">
	  <div class="about-me">
		<img class="mx-auto rounded-circle" src="{{ site.data.me.image }}" alt="">
		<h4>{{ site.data.me.name }}</h4>
		<p class="text-muted">{{ site.data.me.role }}</p>
		<ul class="inline-list social-icons">
		{% for social_item in site.data.socialmedia %}
			<li><a href="{{ social_item.url }}" target="_blank" class="{{ social_item.class }}" title="{{ social_item.title }}"></a></li>
		{% endfor %}
		</ul>
	  </div>
	</div>
  </div>
  <div class="row">
	<div class="col-lg-8 mx-auto text-center">
	  <div class="large text-muted">{{ site.data.me.subtext | markdownify }}</div>
	</div>
  </div>
</div>
</section>
<!-- End About Me -->
