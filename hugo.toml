baseURL = 'https://ndchungict.github.io/'
locale = 'vi-vn'
title = 'Nguyen Chung Notebook'
theme = 'hugo-blog-theme'

[pagination]
  pagerSize = 6

[outputs]
  home = ['html', 'rss', 'json']

[permalinks]
  posts = '/posts/:slug/'

[taxonomies]
  category    = 'categories'
  tag         = 'tags'
  series      = 'series'
  author      = 'authors'
  subcategory = 'subcategories'

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 3
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    # noClasses = false -> Chroma xuất class, màu do assets/css/chroma.css quyết định
    # (github-dark cho dark, github cho light). Sinh lại bằng:
    #   hugo gen chromastyles --style=github-dark
    #   hugo gen chromastyles --style=github
    noClasses = false
    tabWidth = 2
    lineNos = false
    guessSyntax = true

[params]
  description = 'Blog ghi lại và chia sẻ những gì tôi học được về IT, Automation Testing, Tiếng Anh và Tiếng Trung.'
  author      = 'Nguyễn Chung'
  role        = 'Senior Automation Test Engineer'
  email       = 'ndchungict@gmail.com'
  phone       = '0943.313.848'
  tagline     = 'Share • Learn • Grow'
  # Tạm ẩn trang About: đổi thành true để hiện lại
  showAbout   = false
  # Web3Forms — dán access key lấy từ web3forms.com (cần cho trang Contact)
  web3formsKey = ''

  # Giscus — hệ thống comment dùng GitHub Discussions.
  # Lấy giá trị repoId & categoryId tại https://giscus.app sau khi bật Discussions.
  [params.giscus]
    enable      = false              # đổi thành true để bật comment
    repo        = ''                 # ví dụ: 'ndchungict/hugo-blog-page'
    repoId      = ''                 # lấy từ giscus.app
    category    = 'Announcements'    # tên category trong Discussions
    categoryId  = ''                 # lấy từ giscus.app
    mapping     = 'pathname'         # cách map bài viết với discussion
    reactionsEnabled = '1'           # '1' = hiện reactions, '0' = ẩn
    inputPosition    = 'bottom'      # 'top' hoặc 'bottom'
    lang        = 'vi'
    # Theme: tên builtin ('light','dark','transparent_dark',...) HOẶC đường dẫn
    # tới file CSS custom (bắt đầu bằng '/', sẽ tự đổi thành URL tuyệt đối).
    # Tự đổi theo chế độ sáng/tối của site.
    themeLight  = '/css/giscus-light.css'
    themeDark   = '/css/giscus-dark.css'

  # Mạng xã hội hiện ở footer. Để rỗng = ẩn icon đó.
  # Thứ tự hiển thị khai báo trong _partials/footer.html.
  [params.social]
    github   = 'https://github.com/ndchungict'
    facebook = 'https://facebook.com/ndchungict'                                         # ví dụ: 'https://facebook.com/<username>'
    tiktok   = ''                                         # ví dụ: 'https://tiktok.com/@<username>'
    youtube  = ''                                         # ví dụ: 'https://youtube.com/@<channel>'
    linkedin = 'https://linkedin.com/in/nguyen-duc-chung'
    email    = 'ndchungict@gmail.com'
    website  = 'https://ndchungict.github.io'

  # Danh sách category cố định (có thứ tự) — label song ngữ + emoji + class màu.
  # key = tên term trong taxonomy `categories`.
  [[params.categories]]
    key = 'it'
    labelVI = 'Công nghệ & Lập trình'
    labelEN = 'Tech & Programming'
    emoji = '💻'
    color = 'is-it'
  [[params.categories]]
    key = 'english'
    labelVI = 'Tiếng Anh'
    labelEN = 'English'
    emoji = '🇬🇧'
    color = 'is-en'
  [[params.categories]]
    key = 'chinese'
    labelVI = 'Tiếng Trung'
    labelEN = 'Chinese'
    emoji = '🀄'
    color = 'is-cn'

  # Submenu (dropdown) cho category 'it' — label song ngữ, theo thứ tự hiển thị.
  # key = tên term trong taxonomy `subcategories`. Mục không có bài nào sẽ tự ẩn khỏi menu.
  [[params.itSubcategories]]
    key = 'ai'
    labelVI = 'Trí tuệ nhân tạo (AI)'
    labelEN = 'Artificial Intelligence (AI)'
    emoji = '🤖'
  [[params.itSubcategories]]
    key = 'qa-testing'
    labelVI = 'QA & Testing'
    labelEN = 'QA & Testing'
    emoji = '🧪'
  [[params.itSubcategories]]
    key = 'automation'
    labelVI = 'Automation'
    labelEN = 'Automation'
    emoji = '⚙️'
  [[params.itSubcategories]]
    key = 'workflow'
    labelVI = 'Workflow'
    labelEN = 'Workflow'
    emoji = '🔀'
  [[params.itSubcategories]]
    key = 'develop'
    labelVI = 'Develop'
    labelEN = 'Develop'
    emoji = '🧑‍💻'
  [[params.itSubcategories]]
    key = 'devops'
    labelVI = 'DevOps'
    labelEN = 'DevOps'
    emoji = '♾️'
  [[params.itSubcategories]]
    key = 'database'
    labelVI = 'Database'
    labelEN = 'Database'
    emoji = '🗄️'
  [[params.itSubcategories]]
    key = 'version-control'
    labelVI = 'Version Control'
    labelEN = 'Version Control'
    emoji = '🌿'
  [[params.itSubcategories]]
    key = 'tips-tricks'
    labelVI = 'Tips & Trick'
    labelEN = 'Tips & Trick'
    emoji = '💡'
