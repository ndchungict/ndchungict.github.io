{{ define "main" }}
<section class="taxonomy">
  <h1 class="taxonomy__title">{{ .Title }}</h1>
  <ul class="taxonomy__list">
    {{ range .Pages }}
    <li class="taxonomy__item">
      <a class="taxonomy__link" href="{{ .RelPermalink }}">
        {{ .LinkTitle }}
        <span class="taxonomy__count">({{ len .Pages }})</span>
      </a>
    </li>
    {{ end }}
  </ul>
</section>
{{ end }}
