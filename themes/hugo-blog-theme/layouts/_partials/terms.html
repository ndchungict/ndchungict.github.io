{{- /* Danh sách term của 1 taxonomy → tag pill. */}}
{{- $page := .page }}
{{- $taxonomy := .taxonomy }}

{{- with $page.GetTerms $taxonomy }}
  <div class="terms terms--{{ $taxonomy }}">
    <span class="terms__label">{{ (index . 0).Parent.LinkTitle }}:</span>
    <ul class="terms__list">
      {{- range . }}
        <li><a class="tag-pill" href="{{ .RelPermalink }}">{{ if eq $taxonomy "tags" }}#{{ end }}{{ .LinkTitle }}</a></li>
      {{- end }}
    </ul>
  </div>
{{- end }}
