{{- $page := .page }}
{{- $taxonomy := .taxonomy }}

{{- with $page.GetTerms $taxonomy }}
  <div class="terms terms--{{ $taxonomy }}">
    <span class="terms__label">{{ (index . 0).Parent.LinkTitle }}:</span>
    <ul class="terms__list">
      {{- range . }}
        <li class="terms__item">
          <a class="terms__link" href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
        </li>
      {{- end }}
    </ul>
  </div>
{{- end }}
