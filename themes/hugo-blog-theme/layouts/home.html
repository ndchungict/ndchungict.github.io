{{ define "main" }}
<section class="hero">
  <h2 class="hero__title">{{ .Title }}</h2>
  <p class="hero__subtitle">{{ .Description }}</p>
</section>

<section class="posts">
  <h2 class="posts__heading">Latest Posts</h2>
  <div class="post-list">
    {{ range site.RegularPages }}
    <article class="post-card">
      {{ with .Params.thumbnail }}
      <a class="post-card__image-link" href="{{ $.RelPermalink }}">
        <img class="post-card__image" src="{{ . }}" alt="{{ $.Title }}">
      </a>
      {{ end }}
      <div class="post-card__body">
        <h2 class="post-card__title">
          <a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
        </h2>
        <p class="post-card__summary">{{ .Summary }}</p>
        <time class="post-card__date" datetime="{{ .Date | time.Format "2006-01-02" }}">
          {{ .Date | time.Format ":date_long" }}
        </time>
      </div>
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
