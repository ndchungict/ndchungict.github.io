{{ define "main" }}
<article class="contact">
  <h1 class="contact__title">{{ .Title }}</h1>
  <div class="contact__content">
    {{ .Content }}
  </div>
  <form class="contact__form" action="#" method="POST">
    <div class="contact__field">
      <label class="contact__label" for="name">Name</label>
      <input class="contact__input" type="text" id="name" name="name" required>
    </div>
    <div class="contact__field">
      <label class="contact__label" for="email">Email</label>
      <input class="contact__input" type="email" id="email" name="email" required>
    </div>
    <div class="contact__field">
      <label class="contact__label" for="message">Message</label>
      <textarea class="contact__textarea" id="message" name="message" rows="6" required></textarea>
    </div>
    <button class="contact__submit" type="submit">Send</button>
  </form>
</article>
{{ end }}
