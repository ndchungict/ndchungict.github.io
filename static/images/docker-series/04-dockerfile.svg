<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.10)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g opacity="0.06">
    <pattern id="grid4" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="white" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid4)"/>
  </g>

  <!-- Dockerfile (left) -->
  <rect x="200" y="170" width="290" height="290" rx="14" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <g font-family="monospace" font-size="20" fill="rgba(255,255,255,0.85)">
    <text x="226" y="218">FROM</text>
    <text x="226" y="262">COPY</text>
    <text x="226" y="306">RUN</text>
    <text x="226" y="350">EXPOSE</text>
    <text x="226" y="394">CMD</text>
  </g>
  <g fill="rgba(167,139,250,0.55)">
    <rect x="320" y="202" width="140" height="14" rx="7"/>
    <rect x="312" y="246" width="150" height="14" rx="7"/>
    <rect x="290" y="290" width="172" height="14" rx="7"/>
    <rect x="340" y="334" width="120" height="14" rx="7"/>
    <rect x="294" y="378" width="160" height="14" rx="7"/>
  </g>

  <!-- build arrow -->
  <line x1="520" y1="315" x2="690" y2="315" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
  <polygon points="690,303 718,315 690,327" fill="rgba(255,255,255,0.7)"/>
  <circle cx="605" cy="280" r="4" fill="rgba(255,255,255,0.6)"/>

  <!-- Layered image (right) -->
  <g>
    <rect x="760" y="370" width="260" height="58" rx="10" fill="rgba(255,255,255,0.45)"/>
    <rect x="760" y="312" width="260" height="58" rx="10" fill="rgba(255,255,255,0.60)"/>
    <rect x="760" y="254" width="260" height="58" rx="10" fill="rgba(255,255,255,0.75)"/>
    <rect x="760" y="196" width="260" height="58" rx="10" fill="rgba(255,255,255,0.92)"/>
  </g>
  <g stroke="rgba(91,33,182,0.35)" stroke-width="2">
    <line x1="760" y1="254" x2="1020" y2="254"/>
    <line x1="760" y1="312" x2="1020" y2="312"/>
    <line x1="760" y1="370" x2="1020" y2="370"/>
  </g>
</svg>
