<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.07">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="white"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Carrier base (a whale-like platform) -->
  <path d="M 230 470 Q 250 520 360 525 L 850 525 Q 970 520 985 470 Z" fill="rgba(255,255,255,0.14)"/>
  <ellipse cx="608" cy="470" rx="380" ry="22" fill="rgba(255,255,255,0.20)"/>

  <!-- Stacked container boxes -->
  <g stroke="rgba(153,27,27,0.5)" stroke-width="3">
    <!-- bottom row -->
    <rect x="320" y="395" width="110" height="70" rx="6" fill="rgba(255,255,255,0.88)"/>
    <rect x="445" y="395" width="110" height="70" rx="6" fill="rgba(255,255,255,0.80)"/>
    <rect x="570" y="395" width="110" height="70" rx="6" fill="rgba(255,255,255,0.88)"/>
    <rect x="695" y="395" width="110" height="70" rx="6" fill="rgba(255,255,255,0.80)"/>
    <!-- middle row -->
    <rect x="385" y="320" width="110" height="70" rx="6" fill="rgba(255,255,255,0.92)"/>
    <rect x="510" y="320" width="110" height="70" rx="6" fill="rgba(255,255,255,0.84)"/>
    <rect x="635" y="320" width="110" height="70" rx="6" fill="rgba(255,255,255,0.92)"/>
    <!-- top row -->
    <rect x="450" y="245" width="110" height="70" rx="6" fill="rgba(255,255,255,0.96)"/>
    <rect x="575" y="245" width="110" height="70" rx="6" fill="rgba(255,255,255,0.96)"/>
  </g>

  <!-- container door ridges -->
  <g stroke="rgba(234,88,12,0.35)" stroke-width="3">
    <line x1="350" y1="400" x2="350" y2="460"/><line x1="380" y1="400" x2="380" y2="460"/>
    <line x1="600" y1="400" x2="600" y2="460"/><line x1="630" y1="400" x2="630" y2="460"/>
    <line x1="480" y1="325" x2="480" y2="385"/><line x1="665" y1="325" x2="665" y2="385"/>
    <line x1="480" y1="250" x2="480" y2="310"/><line x1="605" y1="250" x2="605" y2="310"/>
  </g>
</svg>
