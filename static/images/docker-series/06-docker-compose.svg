<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f0a2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.10)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g opacity="0.06">
    <pattern id="grid6" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="white" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid6)"/>
  </g>

  <!-- compose file orchestrating services -->
  <rect x="160" y="240" width="200" height="150" rx="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <g fill="rgba(96,165,250,0.6)">
    <rect x="186" y="272" width="120" height="12" rx="6"/>
    <rect x="200" y="298" width="140" height="12" rx="6" fill="rgba(255,255,255,0.4)"/>
    <rect x="200" y="324" width="100" height="12" rx="6" fill="rgba(255,255,255,0.4)"/>
    <rect x="186" y="350" width="120" height="12" rx="6"/>
  </g>

  <!-- branch lines to services -->
  <g stroke="rgba(255,255,255,0.4)" stroke-width="3" fill="none">
    <path d="M 360 280 C 460 280 460 180 560 180"/>
    <path d="M 360 315 C 470 315 470 315 560 315"/>
    <path d="M 360 350 C 460 350 460 450 560 450"/>
  </g>

  <!-- three service containers -->
  <g>
    <rect x="560" y="135" width="240" height="90" rx="12" fill="rgba(255,255,255,0.90)"/>
    <circle cx="595" cy="170" r="7" fill="#22c55e"/>
    <rect x="618" y="164" width="150" height="11" rx="5" fill="rgba(15,10,46,0.4)"/>
    <rect x="582" y="194" width="190" height="10" rx="5" fill="rgba(15,10,46,0.25)"/>
  </g>
  <g>
    <rect x="560" y="270" width="240" height="90" rx="12" fill="rgba(255,255,255,0.82)"/>
    <circle cx="595" cy="305" r="7" fill="#22c55e"/>
    <rect x="618" y="299" width="150" height="11" rx="5" fill="rgba(15,10,46,0.4)"/>
    <rect x="582" y="329" width="190" height="10" rx="5" fill="rgba(15,10,46,0.25)"/>
  </g>
  <g>
    <rect x="560" y="405" width="240" height="90" rx="12" fill="rgba(255,255,255,0.74)"/>
    <circle cx="595" cy="440" r="7" fill="#22c55e"/>
    <rect x="618" y="434" width="150" height="11" rx="5" fill="rgba(15,10,46,0.4)"/>
    <rect x="582" y="464" width="190" height="10" rx="5" fill="rgba(15,10,46,0.25)"/>
  </g>

  <!-- enclosing network boundary -->
  <rect x="530" y="110" width="510" height="410" rx="20" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2" stroke-dasharray="10 10"/>
</svg>
