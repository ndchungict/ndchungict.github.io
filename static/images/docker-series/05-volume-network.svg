<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#042f2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.10)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g opacity="0.06">
    <pattern id="dots5" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="white"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots5)"/>
  </g>

  <!-- network connections -->
  <g stroke="rgba(255,255,255,0.3)" stroke-width="3">
    <line x1="380" y1="250" x2="600" y2="250"/>
    <line x1="600" y1="250" x2="820" y2="250"/>
    <line x1="380" y1="250" x2="600" y2="430"/>
    <line x1="820" y1="250" x2="600" y2="430"/>
  </g>

  <!-- three containers -->
  <g>
    <rect x="300" y="200" width="160" height="100" rx="12" fill="rgba(255,255,255,0.90)"/>
    <circle cx="335" cy="232" r="6" fill="#22c55e"/>
    <rect x="355" y="226" width="80" height="11" rx="5" fill="rgba(4,47,46,0.4)"/>
    <rect x="320" y="258" width="120" height="10" rx="5" fill="rgba(4,47,46,0.25)"/>
  </g>
  <g>
    <rect x="520" y="200" width="160" height="100" rx="12" fill="rgba(255,255,255,0.90)"/>
    <circle cx="555" cy="232" r="6" fill="#22c55e"/>
    <rect x="575" y="226" width="80" height="11" rx="5" fill="rgba(4,47,46,0.4)"/>
    <rect x="540" y="258" width="120" height="10" rx="5" fill="rgba(4,47,46,0.25)"/>
  </g>
  <g>
    <rect x="740" y="200" width="160" height="100" rx="12" fill="rgba(255,255,255,0.90)"/>
    <circle cx="775" cy="232" r="6" fill="#22c55e"/>
    <rect x="795" y="226" width="80" height="11" rx="5" fill="rgba(4,47,46,0.4)"/>
    <rect x="760" y="258" width="120" height="10" rx="5" fill="rgba(4,47,46,0.25)"/>
  </g>

  <!-- volume (data cylinder) -->
  <g>
    <ellipse cx="600" cy="430" rx="90" ry="26" fill="rgba(255,255,255,0.22)"/>
    <rect x="510" y="430" width="180" height="90" fill="rgba(255,255,255,0.16)"/>
    <ellipse cx="600" cy="520" rx="90" ry="26" fill="rgba(255,255,255,0.16)"/>
    <ellipse cx="600" cy="430" rx="90" ry="26" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>
    <ellipse cx="600" cy="474" rx="90" ry="26" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  </g>
</svg>
