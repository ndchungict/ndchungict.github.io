<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#022c22"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.10)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g opacity="0.06">
    <pattern id="dots3" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="white"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots3)"/>
  </g>

  <!-- Workflow: Image -> (run) -> Container -->
  <!-- arrow line -->
  <line x1="430" y1="315" x2="700" y2="315" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
  <polygon points="700,303 728,315 700,327" fill="rgba(255,255,255,0.7)"/>

  <!-- Image box (stacked plates) -->
  <g>
    <rect x="200" y="250" width="220" height="130" rx="14" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <rect x="230" y="278" width="160" height="20" rx="6" fill="rgba(255,255,255,0.85)"/>
    <rect x="230" y="306" width="160" height="20" rx="6" fill="rgba(255,255,255,0.65)"/>
    <rect x="230" y="334" width="160" height="20" rx="6" fill="rgba(255,255,255,0.45)"/>
  </g>

  <!-- Container box (running) -->
  <g>
    <rect x="730" y="240" width="240" height="150" rx="14" fill="rgba(255,255,255,0.92)" stroke="rgba(2,44,34,0.4)" stroke-width="2"/>
    <circle cx="800" cy="282" r="6" fill="#22c55e"/>
    <rect x="820" y="276" width="120" height="12" rx="6" fill="rgba(2,44,34,0.45)"/>
    <rect x="760" y="312" width="180" height="12" rx="6" fill="rgba(2,44,34,0.30)"/>
    <rect x="760" y="338" width="140" height="12" rx="6" fill="rgba(2,44,34,0.30)"/>
  </g>

  <!-- small registry cloud above image -->
  <path d="M 250 160 a 34 34 0 0 1 66 -8 a 28 28 0 0 1 26 40 L 250 192 a 24 24 0 0 1 0 -32 Z" fill="rgba(255,255,255,0.18)"/>
  <line x1="310" y1="200" x2="310" y2="248" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-dasharray="6 8"/>
</svg>
