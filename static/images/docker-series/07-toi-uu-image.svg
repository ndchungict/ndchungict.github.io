<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#030712"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g opacity="0.06">
    <pattern id="dots7" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="white"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots7)"/>
  </g>

  <!-- Big image (before) shrinking to small image (after) -->
  <!-- before: tall stack -->
  <g>
    <rect x="230" y="170" width="240" height="44" rx="8" fill="rgba(255,255,255,0.30)"/>
    <rect x="230" y="220" width="240" height="44" rx="8" fill="rgba(255,255,255,0.30)"/>
    <rect x="230" y="270" width="240" height="44" rx="8" fill="rgba(255,255,255,0.30)"/>
    <rect x="230" y="320" width="240" height="44" rx="8" fill="rgba(255,255,255,0.30)"/>
    <rect x="230" y="370" width="240" height="44" rx="8" fill="rgba(255,255,255,0.30)"/>
    <rect x="230" y="420" width="240" height="44" rx="8" fill="rgba(255,255,255,0.30)"/>
  </g>

  <!-- arrow -->
  <line x1="520" y1="317" x2="690" y2="317" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
  <polygon points="690,305 718,317 690,329" fill="rgba(255,255,255,0.7)"/>

  <!-- after: small compact stack -->
  <g>
    <rect x="760" y="300" width="240" height="42" rx="8" fill="rgba(255,255,255,0.95)"/>
    <rect x="760" y="348" width="240" height="42" rx="8" fill="rgba(255,255,255,0.78)"/>
  </g>
  <g stroke="rgba(3,7,18,0.4)" stroke-width="2">
    <line x1="760" y1="348" x2="1000" y2="348"/>
  </g>
  <!-- spark / optimized marks -->
  <g fill="rgba(34,197,94,0.9)">
    <circle cx="1030" cy="300" r="6"/>
    <circle cx="1050" cy="340" r="5"/>
    <circle cx="1020" cy="380" r="4"/>
  </g>
</svg>
