  <!-- accent dots -->
  <circle cx="150" cy="140" r="11" fill="rgba(255,255,255,0.22)"/>
  <circle cx="1060" cy="490" r="14" fill="rgba(255,255,255,0.18)"/>
  <circle cx="130" cy="500" r="7" fill="rgba(255,255,255,0.20)"/>
