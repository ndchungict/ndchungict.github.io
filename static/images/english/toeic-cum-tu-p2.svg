<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="48%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="28%" r="72%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <pattern id="dots" width="38" height="38" patternUnits="userSpaceOnUse">
      <circle cx="19" cy="19" r="1.4" fill="white"/>
    </pattern>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0b0a2e" flood-opacity="0.45"/>
    </filter>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="65"/>
    </filter>
  </defs>

  <!-- background + vivid colour blobs -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.5">
    <circle cx="190" cy="170" r="130" fill="#22d3ee" filter="url(#blur)"/>
    <circle cx="1050" cy="150" r="140" fill="#f59e0b" filter="url(#blur)"/>
    <circle cx="980" cy="560" r="130" fill="#ec4899" filter="url(#blur)"/>
  </g>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <g opacity="0.06"><rect width="1200" height="630" fill="url(#dots)"/></g>

  <!-- answer sheet clipboard -->
  <g filter="url(#shadow)">
    <rect x="395" y="158" width="380" height="330" rx="24" fill="url(#page)"/>
    <rect x="540" y="142" width="90" height="34" rx="11" fill="#4f46e5"/>
    <rect x="560" y="150" width="50" height="18" rx="9" fill="#312e81"/>
  </g>
  <rect x="432" y="202" width="172" height="22" rx="11" fill="url(#teal)"/>
  <!-- rows of A B C D bubbles -->
  <g>
    <!-- row 1 -->
    <rect x="432" y="262" width="86" height="13" rx="6.5" fill="#cbd5e1"/>
    <circle cx="560" cy="268" r="15" fill="url(#amber)"/>
    <circle cx="610" cy="268" r="15" fill="none" stroke="#cbd5e1" stroke-width="3"/>
    <circle cx="660" cy="268" r="15" fill="none" stroke="#cbd5e1" stroke-width="3"/>
    <circle cx="710" cy="268" r="15" fill="none" stroke="#cbd5e1" stroke-width="3"/>
    <!-- row 2 -->
    <rect x="432" y="322" width="86" height="13" rx="6.5" fill="#cbd5e1"/>
    <circle cx="560" cy="328" r="15" fill="none" stroke="#cbd5e1" stroke-width="3"/>
    <circle cx="610" cy="328" r="15" fill="none" stroke="#cbd5e1" stroke-width="3"/>
    <circle cx="660" cy="328" r="15" fill="url(#teal)"/>
    <circle cx="710" cy="328" r="15" fill="none" stroke="#cbd5e1" stroke-width="3"/>
    <!-- row 3 -->
    <rect x="432" y="382" width="86" height="13" rx="6.5" fill="#cbd5e1"/>
    <circle cx="560" cy="388" r="15" fill="none" stroke="#cbd5e1" stroke-width="3"/>
    <circle cx="610" cy="388" r="15" fill="url(#amber)"/>
    <circle cx="660" cy="388" r="15" fill="none" stroke="#cbd5e1" stroke-width="3"/>
    <circle cx="710" cy="388" r="15" fill="none" stroke="#cbd5e1" stroke-width="3"/>
    <!-- row 4 -->
    <rect x="432" y="442" width="86" height="13" rx="6.5" fill="#cbd5e1"/>
    <circle cx="560" cy="448" r="15" fill="none" stroke="#cbd5e1" stroke-width="3"/>
    <circle cx="610" cy="448" r="15" fill="none" stroke="#cbd5e1" stroke-width="3"/>
    <circle cx="660" cy="448" r="15" fill="none" stroke="#cbd5e1" stroke-width="3"/>
    <circle cx="710" cy="448" r="15" fill="url(#teal)"/>
  </g>

  <!-- success check badge -->
  <g filter="url(#shadow)">
    <circle cx="800" cy="212" r="46" fill="url(#green)"/>
    <path d="M778 214 l16 16 l30 -34" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- pencil -->
  <g transform="rotate(35 845 360)" filter="url(#shadow)">
    <rect x="823" y="252" width="44" height="26" rx="10" fill="#f472b6"/>
    <rect x="823" y="278" width="44" height="15" fill="#e5e7eb"/>
    <rect x="823" y="293" width="44" height="150" fill="url(#amber)"/>
    <path d="M823 443 L845 492 L867 443 Z" fill="#f5d6a8"/>
    <path d="M834 467 L845 492 L856 467 Z" fill="#1f2937"/>
  </g>

  <!-- headphones (listening section) -->
  <g opacity="0.95">
    <path d="M168 392 a96 96 0 0 1 192 0" fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="11" stroke-linecap="round"/>
    <rect x="150" y="386" width="38" height="80" rx="16" fill="rgba(255,255,255,0.94)"/>
    <rect x="340" y="386" width="38" height="80" rx="16" fill="rgba(255,255,255,0.94)"/>
  </g>

  <!-- sparkles -->
  <g fill="#ffffff">
    <path d="M300 210 l9 20 l20 9 l-20 9 l-9 20 l-9 -20 l-20 -9 l20 -9 z"/>
    <path d="M1010 440 l7 15 l15 7 l-15 7 l-7 15 l-7 -15 l-15 -7 l15 -7 z" opacity="0.85"/>
    <path d="M880 470 l6 13 l13 6 l-13 6 l-6 13 l-6 -13 l-13 -6 l13 -6 z" opacity="0.7"/>
  </g>

  <!-- accent dots -->
  <circle cx="1110" cy="300" r="8" fill="rgba(255,255,255,0.2)"/>
  <circle cx="150" cy="250" r="9" fill="rgba(255,255,255,0.22)"/>
</svg>
