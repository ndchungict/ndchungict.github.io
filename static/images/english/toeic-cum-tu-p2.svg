<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.14)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="white"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <g opacity="0.06"><rect width="1200" height="630" fill="url(#dots)"/></g>

  <!-- Answer sheet card -->
  <rect x="350" y="150" width="500" height="330" rx="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>
  <g>
    <!-- row 1 -->
    <rect x="395" y="195" width="120" height="14" rx="7" fill="rgba(255,255,255,0.7)"/>
    <circle cx="600" cy="202" r="16" fill="rgba(129,140,248,0.95)"/>
    <circle cx="652" cy="202" r="16" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5"/>
    <circle cx="704" cy="202" r="16" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5"/>
    <circle cx="756" cy="202" r="16" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5"/>
    <!-- row 2 -->
    <rect x="395" y="265" width="120" height="14" rx="7" fill="rgba(255,255,255,0.7)"/>
    <circle cx="600" cy="272" r="16" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5"/>
    <circle cx="652" cy="272" r="16" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5"/>
    <circle cx="704" cy="272" r="16" fill="rgba(129,140,248,0.95)"/>
    <circle cx="756" cy="272" r="16" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5"/>
    <!-- row 3 -->
    <rect x="395" y="335" width="120" height="14" rx="7" fill="rgba(255,255,255,0.7)"/>
    <circle cx="600" cy="342" r="16" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5"/>
    <circle cx="652" cy="342" r="16" fill="rgba(129,140,248,0.95)"/>
    <circle cx="704" cy="342" r="16" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5"/>
    <circle cx="756" cy="342" r="16" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5"/>
    <!-- row 4 -->
    <rect x="395" y="405" width="120" height="14" rx="7" fill="rgba(255,255,255,0.7)"/>
    <circle cx="600" cy="412" r="16" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5"/>
    <circle cx="652" cy="412" r="16" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5"/>
    <circle cx="704" cy="412" r="16" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5"/>
    <circle cx="756" cy="412" r="16" fill="rgba(129,140,248,0.95)"/>
  </g>

  <!-- pencil -->
  <g transform="rotate(35 840 360)">
    <rect x="817" y="250" width="46" height="205" rx="6" fill="rgba(251,191,36,0.92)"/>
    <rect x="817" y="250" width="46" height="26" fill="rgba(255,255,255,0.85)"/>
    <path d="M817 455 l23 46 l23 -46 z" fill="rgba(30,27,75,0.92)"/>
    <path d="M829 481 l11 20 l11 -20 z" fill="rgba(255,255,255,0.9)"/>
