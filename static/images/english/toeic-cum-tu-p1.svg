<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.14)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="white"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <g opacity="0.06"><rect width="1200" height="630" fill="url(#dots)"/></g>

  <!-- Phrase / speech bubble with abstract collocation lines -->
  <rect x="330" y="165" width="520" height="150" rx="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.32)" stroke-width="2.5" transform="rotate(-4 590 240)"/>
  <g>
    <rect x="300" y="250" width="600" height="195" rx="24" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
    <path d="M380 445 l0 62 l62 -62 z" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linejoin="round"/>
    <rect x="345" y="300" width="300" height="22" rx="11" fill="rgba(255,255,255,0.88)"/>
    <rect x="345" y="348" width="510" height="16" rx="8" fill="rgba(199,210,254,0.7)"/>
    <rect x="345" y="386" width="420" height="16" rx="8" fill="rgba(199,210,254,0.55)"/>
  </g>

  <!-- accent dots -->
  <circle cx="150" cy="130" r="11" fill="rgba(255,255,255,0.22)"/>
  <circle cx="1060" cy="500" r="14" fill="rgba(255,255,255,0.18)"/>
  <circle cx="120" cy="500" r="7" fill="rgba(255,255,255,0.20)"/>
  <circle cx="1080" cy="140" r="8" fill="rgba(255,255,255,0.18)"/>
</svg>
