<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="48%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="28%" r="72%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <pattern id="dots" width="38" height="38" patternUnits="userSpaceOnUse">
      <circle cx="19" cy="19" r="1.4" fill="white"/>
    </pattern>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0b0a2e" flood-opacity="0.45"/>
    </filter>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="65"/>
    </filter>
  </defs>

  <!-- background + vivid colour blobs -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.5">
    <circle cx="200" cy="150" r="130" fill="#f59e0b" filter="url(#blur)"/>
    <circle cx="1040" cy="160" r="140" fill="#ec4899" filter="url(#blur)"/>
    <circle cx="960" cy="580" r="130" fill="#22d3ee" filter="url(#blur)"/>
  </g>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <g opacity="0.06"><rect width="1200" height="630" fill="url(#dots)"/></g>

  <!-- flashcard deck (vocabulary) -->
  <g transform="rotate(-10 560 360)"><rect x="410" y="255" width="300" height="210" rx="26" fill="url(#teal)" filter="url(#shadow)"/></g>
  <g transform="rotate(-4 560 360)"><rect x="410" y="255" width="300" height="210" rx="26" fill="url(#amber)" filter="url(#shadow)"/></g>
  <g transform="rotate(3 560 360)" filter="url(#shadow)">
    <rect x="410" y="255" width="300" height="210" rx="26" fill="url(#page)"/>
    <text x="452" y="378" font-family="Georgia,'Times New Roman',serif" font-size="76" font-weight="700" fill="#4f46e5">Aa</text>
    <rect x="556" y="312" width="118" height="13" rx="6.5" fill="#cbd5e1"/>
    <rect x="556" y="336" width="96" height="11" rx="5.5" fill="#d8dee9"/>
    <rect x="452" y="404" width="226" height="13" rx="6.5" fill="#cbd5e1"/>
    <rect x="452" y="428" width="170" height="11" rx="5.5" fill="#d8dee9"/>
  </g>

  <!-- floating phrase bubbles -->
  <g transform="rotate(7 885 175)" filter="url(#shadow)">
    <rect x="770" y="118" width="230" height="114" rx="20" fill="url(#teal)"/>
    <path d="M812 232 l0 34 l34 -34 z" fill="#06b6d4"/>
    <rect x="798" y="150" width="140" height="15" rx="7.5" fill="rgba(255,255,255,0.96)"/>
    <rect x="798" y="178" width="174" height="11" rx="5.5" fill="rgba(255,255,255,0.7)"/>
    <rect x="798" y="198" width="110" height="11" rx="5.5" fill="rgba(255,255,255,0.55)"/>
  </g>
  <g transform="rotate(-7 995 330)" filter="url(#shadow)">
    <rect x="912" y="288" width="166" height="92" rx="18" fill="url(#amber)"/>
    <path d="M1040 380 l0 28 l28 -28 z" fill="#f59e0b"/>
    <rect x="938" y="316" width="96" height="13" rx="6.5" fill="rgba(255,255,255,0.96)"/>
    <rect x="938" y="340" width="120" height="10" rx="5" fill="rgba(255,255,255,0.7)"/>
  </g>

  <!-- headphones (listening) -->
  <g opacity="0.95">
    <path d="M168 392 a96 96 0 0 1 192 0" fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="11" stroke-linecap="round"/>
    <rect x="150" y="386" width="38" height="80" rx="16" fill="rgba(255,255,255,0.94)"/>
    <rect x="340" y="386" width="38" height="80" rx="16" fill="rgba(255,255,255,0.94)"/>
  </g>

  <!-- sparkles -->
  <g fill="#ffffff">
    <path d="M300 200 l9 20 l20 9 l-20 9 l-9 20 l-9 -20 l-20 -9 l20 -9 z"/>
    <path d="M1020 430 l7 15 l15 7 l-15 7 l-7 15 l-7 -15 l-15 -7 l15 -7 z" opacity="0.85"/>
    <path d="M150 560 l6 13 l13 6 l-13 6 l-6 13 l-6 -13 l-13 -6 l13 -6 z" opacity="0.7"/>
  </g>

  <!-- accent dots -->
  <circle cx="720" cy="170" r="9" fill="rgba(255,255,255,0.22)"/>
  <circle cx="1110" cy="290" r="7" fill="rgba(255,255,255,0.2)"/>
</svg>
