<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.14)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle dot grid texture -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="white"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Three forms V1 -> V2 -> V3 as connected cards -->
  <g font-family="'Segoe UI',system-ui,Arial,sans-serif" text-anchor="middle" dominant-baseline="middle">
    <!-- card 1: go -->
    <rect x="150" y="225" width="240" height="180" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.55)" stroke-width="3"/>
    <text x="270" y="295" font-size="74" font-weight="700" fill="rgba(255,255,255,0.96)">go</text>
    <text x="270" y="355" font-size="30" font-weight="600" fill="rgba(199,210,254,0.85)" letter-spacing="3">V1</text>

    <!-- arrow 1 -->
    <line x1="400" y1="315" x2="455" y2="315" stroke="rgba(255,255,255,0.6)" stroke-width="4"/>
    <path d="M455 315 l-16 -9 v18 z" fill="rgba(255,255,255,0.6)"/>

    <!-- card 2: went -->
    <rect x="465" y="225" width="240" height="180" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.55)" stroke-width="3"/>
    <text x="585" y="295" font-size="64" font-weight="700" fill="rgba(255,255,255,0.96)">went</text>
    <text x="585" y="355" font-size="30" font-weight="600" fill="rgba(199,210,254,0.85)" letter-spacing="3">V2</text>

    <!-- arrow 2 -->
    <line x1="715" y1="315" x2="770" y2="315" stroke="rgba(255,255,255,0.6)" stroke-width="4"/>
    <path d="M770 315 l-16 -9 v18 z" fill="rgba(255,255,255,0.6)"/>

    <!-- card 3: gone -->
    <rect x="780" y="225" width="240" height="180" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.55)" stroke-width="3"/>
    <text x="900" y="295" font-size="64" font-weight="700" fill="rgba(255,255,255,0.96)">gone</text>
    <text x="900" y="355" font-size="30" font-weight="600" fill="rgba(199,210,254,0.85)" letter-spacing="3">V3</text>
  </g>

  <!-- brush-dot accents -->
  <circle cx="130" cy="120" r="10" fill="rgba(255,255,255,0.22)"/>
  <circle cx="1070" cy="500" r="13" fill="rgba(255,255,255,0.18)"/>
  <circle cx="100" cy="510" r="7" fill="rgba(255,255,255,0.20)"/>
</svg>
