<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f0f2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.05" stroke="white" stroke-width="1">
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="480" x2="1200" y2="480"/>
  </g>

  <!-- request box -->
  <g transform="translate(140,200)" font-family="monospace">
    <rect x="0" y="0" width="380" height="230" rx="12" fill="rgba(0,0,0,0.3)" stroke="rgba(96,165,250,0.5)" stroke-width="2"/>
    <rect x="0" y="0" width="380" height="40" rx="12" fill="rgba(96,165,250,0.2)"/>
    <text x="20" y="27" font-size="16" fill="#bfdbfe">REQUEST</text>
    <text x="20" y="78" font-size="16" fill="#86efac">POST /api/users</text>
    <text x="20" y="110" font-size="15" fill="rgba(255,255,255,0.6)">Content-Type: json</text>
    <text x="20" y="150" font-size="15" fill="rgba(255,255,255,0.8)">{</text>
    <text x="20" y="176" font-size="15" fill="#fde68a">  "name": "Chung",</text>
    <text x="20" y="202" font-size="15" fill="#fde68a">  "role": "admin"</text>
    <text x="20" y="228" font-size="15" fill="rgba(255,255,255,0.8)">}</text>
  </g>

  <!-- arrow -->
  <g stroke="rgba(255,255,255,0.45)" stroke-width="3" fill="none">
    <path d="M 530 315 L 660 315"/>
  </g>
  <polygon points="660,315 648,309 648,321" fill="rgba(255,255,255,0.45)"/>

  <!-- response box -->
  <g transform="translate(680,200)" font-family="monospace">
    <rect x="0" y="0" width="380" height="230" rx="12" fill="rgba(0,0,0,0.3)" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>
    <rect x="0" y="0" width="380" height="40" rx="12" fill="rgba(74,222,128,0.2)"/>
    <text x="20" y="27" font-size="16" fill="#bbf7d0">RESPONSE</text>
    <text x="20" y="78" font-size="16" fill="#4ade80">201 Created</text>
    <text x="20" y="118" font-size="15" fill="rgba(255,255,255,0.8)">{</text>
    <text x="20" y="144" font-size="15" fill="#fde68a">  "id": 42,</text>
    <text x="20" y="170" font-size="15" fill="#fde68a">  "name": "Chung",</text>
    <text x="20" y="196" font-size="15" fill="#fde68a">  "role": "admin"</text>
    <text x="20" y="222" font-size="15" fill="rgba(255,255,255,0.8)">}</text>
  </g>
</svg>
