<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#1c0a00"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.05" stroke="white" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/><line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- pipeline boxes -->
  <g font-family="monospace" font-size="17" text-anchor="middle">
    <rect x="70" y="270" width="160" height="90" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <text x="150" y="312" fill="rgba(255,255,255,0.85)">push</text>
    <text x="150" y="338" font-size="13" fill="rgba(255,255,255,0.45)">git commit</text>

    <rect x="310" y="270" width="160" height="90" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <text x="390" y="312" fill="rgba(255,255,255,0.85)">install</text>
    <text x="390" y="338" font-size="13" fill="rgba(255,255,255,0.45)">deps + browsers</text>

    <rect x="550" y="270" width="160" height="90" rx="12" fill="rgba(251,191,36,0.2)" stroke="#fbbf24" stroke-width="2.5"/>
    <text x="630" y="312" fill="#fde68a">test</text>
    <text x="630" y="338" font-size="13" fill="rgba(255,255,255,0.55)">shard 1..n</text>

    <rect x="790" y="270" width="160" height="90" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <text x="870" y="312" fill="rgba(255,255,255,0.85)">report</text>
    <text x="870" y="338" font-size="13" fill="rgba(255,255,255,0.45)">merge + upload</text>

    <rect x="1010" y="270" width="130" height="90" rx="12" fill="rgba(74,222,128,0.18)" stroke="#4ade80" stroke-width="2.5"/>
    <text x="1075" y="312" fill="#bbf7d0">deploy</text>
    <text x="1075" y="338" font-size="13" fill="rgba(255,255,255,0.5)">✓ green</text>
  </g>

  <!-- arrows -->
  <g stroke="rgba(255,255,255,0.45)" stroke-width="3" fill="none">
    <path d="M 230 315 L 305 315"/>
    <path d="M 470 315 L 545 315"/>
    <path d="M 710 315 L 785 315"/>
    <path d="M 950 315 L 1005 315"/>
  </g>
  <g fill="rgba(255,255,255,0.45)">
    <polygon points="305,315 293,309 293,321"/>
    <polygon points="545,315 533,309 533,321"/>
    <polygon points="785,315 773,309 773,321"/>
    <polygon points="1005,315 993,309 993,321"/>
  </g>

  <!-- docker hint -->
  <text x="600" y="180" font-family="monospace" font-size="18" fill="rgba(255,255,255,0.5)" text-anchor="middle">🐳 mcr.microsoft.com/playwright</text>
</svg>
