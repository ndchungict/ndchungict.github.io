<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f0f2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- line grid texture -->
  <g opacity="0.05" stroke="white" stroke-width="1">
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Terminal window -->
  <g transform="translate(290,140)">
    <rect x="0" y="0" width="620" height="350" rx="14" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <rect x="0" y="0" width="620" height="44" rx="14" fill="rgba(255,255,255,0.1)"/>
    <circle cx="28" cy="22" r="8" fill="#fca5a5"/><circle cx="56" cy="22" r="8" fill="#fde68a"/><circle cx="84" cy="22" r="8" fill="#86efac"/>

    <text x="36" y="100" font-family="monospace" font-size="20" fill="#86efac">$ npm init playwright@latest</text>
    <text x="36" y="140" font-family="monospace" font-size="18" fill="rgba(255,255,255,0.55)">✔ Installing browsers...</text>
    <text x="36" y="172" font-family="monospace" font-size="18" fill="rgba(255,255,255,0.55)">✔ Chromium  Firefox  WebKit</text>
    <text x="36" y="212" font-family="monospace" font-size="20" fill="#86efac">$ npx playwright test</text>
    <text x="36" y="252" font-family="monospace" font-size="18" fill="rgba(255,255,255,0.55)">Running 3 tests using 3 workers</text>
    <text x="36" y="292" font-family="monospace" font-size="18" fill="#4ade80">  3 passed (2.1s)</text>
    <rect x="36" y="306" width="14" height="22" fill="#86efac" opacity="0.9"/>
  </g>
</svg>
