<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.06" fill="white">
    <circle cx="120" cy="110" r="3"/><circle cx="320" cy="110" r="3"/><circle cx="520" cy="110" r="3"/>
    <circle cx="720" cy="110" r="3"/><circle cx="920" cy="110" r="3"/><circle cx="1080" cy="110" r="3"/>
    <circle cx="120" cy="520" r="3"/><circle cx="320" cy="520" r="3"/><circle cx="520" cy="520" r="3"/>
    <circle cx="720" cy="520" r="3"/><circle cx="920" cy="520" r="3"/><circle cx="1080" cy="520" r="3"/>
  </g>

  <!-- test pyramid (trophy-ish) -->
  <g transform="translate(300,150)" font-family="monospace" text-anchor="middle">
    <!-- E2E top -->
    <polygon points="200,0 280,90 120,90" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
    <text x="200" y="70" font-size="18" fill="white">E2E</text>
    <!-- Integration mid -->
    <polygon points="120,100 280,100 350,210 50,210" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <text x="200" y="170" font-size="20" fill="rgba(255,255,255,0.95)">Integration / API</text>
    <!-- Unit base -->
    <polygon points="50,220 350,220 420,330 -20,330" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <text x="200" y="290" font-size="22" fill="rgba(255,255,255,0.9)">Unit</text>
  </g>

  <!-- checklist on right -->
  <g font-family="monospace" font-size="19" fill="rgba(255,255,255,0.9)">
    <g>
      <circle cx="800" cy="200" r="12" fill="none" stroke="#fde68a" stroke-width="3"/>
      <path d="M 794 200 l 5 6 l 9 -12" stroke="#fde68a" stroke-width="3" fill="none"/>
      <text x="828" y="207">test độc lập</text>
    </g>
    <g>
      <circle cx="800" cy="250" r="12" fill="none" stroke="#fde68a" stroke-width="3"/>
      <path d="M 794 250 l 5 6 l 9 -12" stroke="#fde68a" stroke-width="3" fill="none"/>
      <text x="828" y="257">locator ngữ nghĩa</text>
    </g>
    <g>
      <circle cx="800" cy="300" r="12" fill="none" stroke="#fde68a" stroke-width="3"/>
      <path d="M 794 300 l 5 6 l 9 -12" stroke="#fde68a" stroke-width="3" fill="none"/>
      <text x="828" y="307">web-first assertions</text>
    </g>
    <g>
      <circle cx="800" cy="350" r="12" fill="none" stroke="#fde68a" stroke-width="3"/>
      <path d="M 794 350 l 5 6 l 9 -12" stroke="#fde68a" stroke-width="3" fill="none"/>
      <text x="828" y="357">không sleep</text>
    </g>
    <g>
      <circle cx="800" cy="400" r="12" fill="none" stroke="#fde68a" stroke-width="3"/>
      <path d="M 794 400 l 5 6 l 9 -12" stroke="#fde68a" stroke-width="3" fill="none"/>
      <text x="828" y="407">chạy trên CI</text>
    </g>
  </g>
</svg>
