<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#042f2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.05" stroke="white" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/><line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- stacked tabs -->
  <g>
    <rect x="180" y="180" width="360" height="240" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <rect x="155" y="155" width="360" height="240" rx="12" fill="rgba(255,255,255,0.09)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <rect x="130" y="130" width="360" height="240" rx="12" fill="rgba(255,255,255,0.14)" stroke="rgba(94,234,212,0.6)" stroke-width="2.5"/>
    <rect x="130" y="130" width="360" height="36" rx="12" fill="rgba(255,255,255,0.16)"/>
    <circle cx="152" cy="148" r="6" fill="#5eead4"/><circle cx="172" cy="148" r="6" fill="rgba(255,255,255,0.4)"/>
    <text x="310" y="270" font-family="monospace" font-size="18" fill="rgba(255,255,255,0.7)" text-anchor="middle">tab / popup</text>
  </g>

  <!-- iframe inside -->
  <g transform="translate(640,150)" font-family="monospace" text-anchor="middle">
    <rect x="0" y="0" width="420" height="160" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <rect x="30" y="30" width="360" height="100" rx="8" fill="rgba(94,234,212,0.12)" stroke="#5eead4" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="210" y="86" font-size="18" fill="#ccfbf1">frameLocator(...)</text>
  </g>

  <!-- file up/down + dialog row -->
  <g transform="translate(640,350)" font-family="monospace" font-size="15" fill="rgba(255,255,255,0.75)" text-anchor="middle">
    <rect x="0" y="0" width="130" height="80" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="65" y="38" font-size="26">⬆</text><text x="65" y="62">upload</text>
    <rect x="150" y="0" width="130" height="80" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="215" y="38" font-size="26">⬇</text><text x="215" y="62">download</text>
    <rect x="300" y="0" width="130" height="80" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="365" y="40" font-size="22">!</text><text x="365" y="62">dialog</text>
  </g>
</svg>
