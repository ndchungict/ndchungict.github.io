<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Dot grid texture -->
  <g opacity="0.06" fill="white">
    <circle cx="100" cy="100" r="3"/><circle cx="250" cy="100" r="3"/><circle cx="400" cy="100" r="3"/>
    <circle cx="550" cy="100" r="3"/><circle cx="700" cy="100" r="3"/><circle cx="850" cy="100" r="3"/>
    <circle cx="1000" cy="100" r="3"/><circle cx="1100" cy="100" r="3"/>
    <circle cx="100" cy="530" r="3"/><circle cx="250" cy="530" r="3"/><circle cx="400" cy="530" r="3"/>
    <circle cx="550" cy="530" r="3"/><circle cx="700" cy="530" r="3"/><circle cx="850" cy="530" r="3"/>
    <circle cx="1000" cy="530" r="3"/><circle cx="1100" cy="530" r="3"/>
  </g>

  <!-- Three browser windows (chromium, firefox, webkit) -->
  <g transform="translate(250,200)">
    <rect x="0" y="0" width="220" height="160" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="34" rx="12" fill="rgba(255,255,255,0.18)"/>
    <circle cx="22" cy="17" r="6" fill="#fca5a5"/><circle cx="44" cy="17" r="6" fill="#fde68a"/><circle cx="66" cy="17" r="6" fill="#86efac"/>
    <rect x="24" y="60" width="120" height="14" rx="7" fill="rgba(255,255,255,0.55)"/>
    <rect x="24" y="86" width="170" height="10" rx="5" fill="rgba(255,255,255,0.3)"/>
    <rect x="24" y="106" width="140" height="10" rx="5" fill="rgba(255,255,255,0.3)"/>
  </g>
  <g transform="translate(490,180)">
    <rect x="0" y="0" width="220" height="200" rx="12" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"/>
    <rect x="0" y="0" width="220" height="34" rx="12" fill="rgba(255,255,255,0.24)"/>
    <circle cx="22" cy="17" r="6" fill="#fca5a5"/><circle cx="44" cy="17" r="6" fill="#fde68a"/><circle cx="66" cy="17" r="6" fill="#86efac"/>
    <rect x="24" y="62" width="150" height="16" rx="8" fill="rgba(255,255,255,0.7)"/>
    <rect x="24" y="92" width="170" height="11" rx="5" fill="rgba(255,255,255,0.4)"/>
    <rect x="24" y="114" width="140" height="11" rx="5" fill="rgba(255,255,255,0.4)"/>
    <rect x="24" y="150" width="90" height="28" rx="6" fill="#4ade80" opacity="0.85"/>
  </g>
  <g transform="translate(730,200)">
    <rect x="0" y="0" width="220" height="160" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="34" rx="12" fill="rgba(255,255,255,0.18)"/>
    <circle cx="22" cy="17" r="6" fill="#fca5a5"/><circle cx="44" cy="17" r="6" fill="#fde68a"/><circle cx="66" cy="17" r="6" fill="#86efac"/>
    <rect x="24" y="60" width="120" height="14" rx="7" fill="rgba(255,255,255,0.55)"/>
    <rect x="24" y="86" width="170" height="10" rx="5" fill="rgba(255,255,255,0.3)"/>
    <rect x="24" y="106" width="140" height="10" rx="5" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- single engine driving all three -->
  <circle cx="600" cy="470" r="34" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.55)" stroke-width="2"/>
  <line x1="360" y1="380" x2="585" y2="450" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <line x1="600" y1="380" x2="600" y2="436" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="840" y1="380" x2="615" y2="450" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
</svg>
