<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#042f2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.05" fill="white">
    <circle cx="150" cy="130" r="3"/><circle cx="450" cy="130" r="3"/><circle cx="750" cy="130" r="3"/><circle cx="1050" cy="130" r="3"/>
    <circle cx="150" cy="500" r="3"/><circle cx="450" cy="500" r="3"/><circle cx="750" cy="500" r="3"/><circle cx="1050" cy="500" r="3"/>
  </g>

  <!-- checklist of actionability conditions -->
  <g font-family="monospace" font-size="20" fill="rgba(255,255,255,0.85)">
    <text x="180" y="210" font-size="22" fill="rgba(255,255,255,0.6)">Trước khi click, Playwright chờ:</text>
    <g>
      <circle cx="200" cy="260" r="12" fill="none" stroke="#5eead4" stroke-width="3"/>
      <path d="M 194 260 l 5 6 l 9 -12" stroke="#5eead4" stroke-width="3" fill="none"/>
      <text x="230" y="267">attached vào DOM</text>
    </g>
    <g>
      <circle cx="200" cy="305" r="12" fill="none" stroke="#5eead4" stroke-width="3"/>
      <path d="M 194 305 l 5 6 l 9 -12" stroke="#5eead4" stroke-width="3" fill="none"/>
      <text x="230" y="312">visible</text>
    </g>
    <g>
      <circle cx="200" cy="350" r="12" fill="none" stroke="#5eead4" stroke-width="3"/>
      <path d="M 194 350 l 5 6 l 9 -12" stroke="#5eead4" stroke-width="3" fill="none"/>
      <text x="230" y="357">stable (hết animation)</text>
    </g>
    <g>
      <circle cx="200" cy="395" r="12" fill="none" stroke="#5eead4" stroke-width="3"/>
      <path d="M 194 395 l 5 6 l 9 -12" stroke="#5eead4" stroke-width="3" fill="none"/>
      <text x="230" y="402">nhận được event (không bị che)</text>
    </g>
    <g>
      <circle cx="200" cy="440" r="12" fill="none" stroke="#5eead4" stroke-width="3"/>
      <path d="M 194 440 l 5 6 l 9 -12" stroke="#5eead4" stroke-width="3" fill="none"/>
      <text x="230" y="447">enabled</text>
    </g>
  </g>

  <!-- cursor / click ripple -->
  <g transform="translate(880,330)">
    <circle cx="0" cy="0" r="70" fill="none" stroke="rgba(94,234,212,0.25)" stroke-width="3"/>
    <circle cx="0" cy="0" r="48" fill="none" stroke="rgba(94,234,212,0.45)" stroke-width="3"/>
    <circle cx="0" cy="0" r="26" fill="rgba(94,234,212,0.2)"/>
    <path d="M -8 -14 L 22 4 L 6 8 L 14 26 L 6 30 L -2 12 L -14 20 Z" fill="#ccfbf1" stroke="#0e7490" stroke-width="1.5"/>
  </g>
</svg>
