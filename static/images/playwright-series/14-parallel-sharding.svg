<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#030712"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.05" fill="white">
    <circle cx="150" cy="100" r="3"/><circle cx="450" cy="100" r="3"/><circle cx="750" cy="100" r="3"/><circle cx="1050" cy="100" r="3"/>
    <circle cx="150" cy="540" r="3"/><circle cx="450" cy="540" r="3"/><circle cx="750" cy="540" r="3"/><circle cx="1050" cy="540" r="3"/>
  </g>

  <!-- 4 worker lanes -->
  <g font-family="monospace" font-size="14" fill="rgba(255,255,255,0.55)">
    <text x="80" y="175" fill="#86efac">worker 1</text>
    <text x="80" y="265" fill="#60a5fa">worker 2</text>
    <text x="80" y="355" fill="#fbbf24">worker 3</text>
    <text x="80" y="445" fill="#f472b6">worker 4</text>
  </g>

  <!-- lane 1 -->
  <g>
    <rect x="190" y="150" width="120" height="40" rx="6" fill="rgba(134,239,172,0.25)" stroke="#86efac" stroke-width="1.5"/>
    <rect x="330" y="150" width="180" height="40" rx="6" fill="rgba(134,239,172,0.25)" stroke="#86efac" stroke-width="1.5"/>
    <rect x="530" y="150" width="100" height="40" rx="6" fill="rgba(134,239,172,0.25)" stroke="#86efac" stroke-width="1.5"/>
  </g>
  <!-- lane 2 -->
  <g>
    <rect x="190" y="240" width="160" height="40" rx="6" fill="rgba(96,165,250,0.25)" stroke="#60a5fa" stroke-width="1.5"/>
    <rect x="370" y="240" width="110" height="40" rx="6" fill="rgba(96,165,250,0.25)" stroke="#60a5fa" stroke-width="1.5"/>
    <rect x="500" y="240" width="200" height="40" rx="6" fill="rgba(96,165,250,0.25)" stroke="#60a5fa" stroke-width="1.5"/>
  </g>
  <!-- lane 3 -->
  <g>
    <rect x="190" y="330" width="120" height="40" rx="6" fill="rgba(251,191,36,0.25)" stroke="#fbbf24" stroke-width="1.5"/>
    <rect x="330" y="330" width="140" height="40" rx="6" fill="rgba(251,191,36,0.25)" stroke="#fbbf24" stroke-width="1.5"/>
    <rect x="490" y="330" width="130" height="40" rx="6" fill="rgba(251,191,36,0.25)" stroke="#fbbf24" stroke-width="1.5"/>
  </g>
  <!-- lane 4 -->
  <g>
    <rect x="190" y="420" width="180" height="40" rx="6" fill="rgba(244,114,182,0.25)" stroke="#f472b6" stroke-width="1.5"/>
    <rect x="390" y="420" width="100" height="40" rx="6" fill="rgba(244,114,182,0.25)" stroke="#f472b6" stroke-width="1.5"/>
    <rect x="510" y="420" width="150" height="40" rx="6" fill="rgba(244,114,182,0.25)" stroke="#f472b6" stroke-width="1.5"/>
  </g>

  <!-- shards bracket -->
  <g font-family="monospace" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle">
    <line x1="800" y1="140" x2="800" y2="290" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <text x="900" y="220">shard 1/2</text>
    <line x1="800" y1="320" x2="800" y2="470" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <text x="900" y="400">shard 2/2</text>
    <text x="950" y="510" font-size="14" fill="rgba(255,255,255,0.45)">(chia cho nhiều máy CI)</text>
  </g>
</svg>
