<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#1c0a00"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.05" fill="white">
    <circle cx="150" cy="120" r="3"/><circle cx="450" cy="120" r="3"/><circle cx="750" cy="120" r="3"/><circle cx="1050" cy="120" r="3"/>
    <circle cx="150" cy="510" r="3"/><circle cx="450" cy="510" r="3"/><circle cx="750" cy="510" r="3"/><circle cx="1050" cy="510" r="3"/>
  </g>

  <g font-family="monospace" text-anchor="middle">
    <!-- browser -->
    <rect x="100" y="270" width="200" height="100" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <text x="200" y="315" font-size="18" fill="rgba(255,255,255,0.85)">Browser</text>
    <text x="200" y="342" font-size="14" fill="rgba(255,255,255,0.45)">fetch('/api')</text>

    <!-- intercept gate -->
    <rect x="470" y="250" width="260" height="140" rx="14" fill="rgba(251,191,36,0.18)" stroke="#fbbf24" stroke-width="2.5"/>
    <text x="600" y="295" font-size="20" fill="#fde68a">page.route()</text>
    <text x="600" y="325" font-size="14" fill="rgba(255,255,255,0.6)">chặn / sửa / giả lập</text>
    <text x="600" y="352" font-size="14" fill="rgba(255,255,255,0.6)">fulfill · abort · continue</text>

    <!-- real server -->
    <rect x="900" y="270" width="200" height="100" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="1000" y="315" font-size="18" fill="rgba(255,255,255,0.6)">Server thật</text>
    <text x="1000" y="342" font-size="14" fill="rgba(255,255,255,0.4)">(có thể bỏ qua)</text>
  </g>

  <!-- arrows -->
  <g stroke="rgba(255,255,255,0.45)" stroke-width="3" fill="none">
    <path d="M 300 320 L 460 320"/>
  </g>
  <polygon points="460,320 448,314 448,326" fill="rgba(255,255,255,0.45)"/>
  <g stroke="rgba(255,255,255,0.25)" stroke-width="2.5" stroke-dasharray="7 6" fill="none">
    <path d="M 730 320 L 890 320"/>
  </g>
  <!-- mock response back -->
  <g stroke="#fbbf24" stroke-width="3" fill="none">
    <path d="M 600 390 Q 600 450 300 450 L 250 450 L 250 375"/>
  </g>
  <polygon points="250,375 244,387 256,387" fill="#fbbf24"/>
  <text x="430" y="478" font-family="monospace" font-size="15" fill="#fde68a" text-anchor="middle">mock JSON trả về ngay</text>
</svg>
