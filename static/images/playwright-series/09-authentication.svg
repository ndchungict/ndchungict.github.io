<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.05" stroke="white" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/><line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- login once -->
  <g transform="translate(160,230)" font-family="monospace" text-anchor="middle">
    <rect x="0" y="0" width="230" height="170" rx="14" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <text x="115" y="40" font-size="17" fill="rgba(255,255,255,0.75)">Đăng nhập</text>
    <rect x="30" y="60" width="170" height="26" rx="5" fill="rgba(255,255,255,0.2)"/>
    <rect x="30" y="96" width="170" height="26" rx="5" fill="rgba(255,255,255,0.2)"/>
    <rect x="60" y="132" width="110" height="28" rx="6" fill="#a78bfa"/>
    <text x="115" y="151" font-size="14" fill="#1e1b4b">Login</text>
  </g>

  <!-- arrow to saved state -->
  <g stroke="rgba(255,255,255,0.45)" stroke-width="3" fill="none">
    <path d="M 400 315 L 510 315"/>
  </g>
  <polygon points="510,315 498,309 498,321" fill="rgba(255,255,255,0.45)"/>

  <!-- storage state file -->
  <g transform="translate(530,240)" font-family="monospace" text-anchor="middle">
    <rect x="0" y="0" width="200" height="150" rx="12" fill="rgba(196,181,253,0.18)" stroke="#c4b5fd" stroke-width="2.5"/>
    <text x="100" y="34" font-size="15" fill="#ede9fe">storageState</text>
    <text x="100" y="58" font-size="13" fill="rgba(255,255,255,0.55)">.json</text>
    <text x="100" y="92" font-size="12" fill="rgba(255,255,255,0.5)">cookies</text>
    <text x="100" y="114" font-size="12" fill="rgba(255,255,255,0.5)">localStorage</text>
    <!-- lock icon -->
    <rect x="80" y="125" width="40" height="20" rx="4" fill="#c4b5fd"/>
    <path d="M 87 125 v -8 a 13 13 0 0 1 26 0 v 8" fill="none" stroke="#c4b5fd" stroke-width="3"/>
  </g>

  <!-- fan out to many tests reusing -->
  <g stroke="rgba(255,255,255,0.4)" stroke-width="2.5" fill="none">
    <path d="M 730 290 Q 850 250 980 220"/>
    <path d="M 730 315 L 980 315"/>
    <path d="M 730 340 Q 850 380 980 410"/>
  </g>
  <g font-family="monospace" font-size="15" fill="rgba(255,255,255,0.7)" text-anchor="middle">
    <rect x="980" y="200" width="170" height="40" rx="8" fill="rgba(255,255,255,0.1)"/><text x="1065" y="225">test 1 (đã login)</text>
    <rect x="980" y="295" width="170" height="40" rx="8" fill="rgba(255,255,255,0.1)"/><text x="1065" y="320">test 2 (đã login)</text>
    <rect x="980" y="390" width="170" height="40" rx="8" fill="rgba(255,255,255,0.1)"/><text x="1065" y="415">test 3 (đã login)</text>
  </g>
</svg>
