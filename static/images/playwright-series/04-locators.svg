<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.05" stroke="white" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/><line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- mock page with elements -->
  <g transform="translate(180,150)">
    <rect x="0" y="0" width="500" height="330" rx="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <rect x="40" y="40" width="280" height="22" rx="6" fill="rgba(255,255,255,0.35)"/>
    <rect x="40" y="84" width="420" height="12" rx="6" fill="rgba(255,255,255,0.18)"/>
    <rect x="40" y="106" width="380" height="12" rx="6" fill="rgba(255,255,255,0.18)"/>
    <!-- targeted button -->
    <rect x="40" y="150" width="200" height="56" rx="10" fill="rgba(167,139,250,0.3)" stroke="#a78bfa" stroke-width="3"/>
    <text x="140" y="185" font-family="monospace" font-size="18" fill="#ede9fe" text-anchor="middle">Đăng nhập</text>
    <rect x="40" y="240" width="420" height="12" rx="6" fill="rgba(255,255,255,0.18)"/>
    <rect x="40" y="262" width="300" height="12" rx="6" fill="rgba(255,255,255,0.18)"/>
  </g>

  <!-- crosshair targeting the button -->
  <g transform="translate(320,315)">
    <circle cx="0" cy="0" r="60" fill="none" stroke="#c4b5fd" stroke-width="3" opacity="0.9"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.5"/>
    <line x1="-78" y1="0" x2="-50" y2="0" stroke="#c4b5fd" stroke-width="3"/>
    <line x1="50" y1="0" x2="78" y2="0" stroke="#c4b5fd" stroke-width="3"/>
    <line x1="0" y1="-78" x2="0" y2="-50" stroke="#c4b5fd" stroke-width="3"/>
    <line x1="0" y1="50" x2="0" y2="78" stroke="#c4b5fd" stroke-width="3"/>
    <circle cx="0" cy="0" r="5" fill="#ede9fe"/>
  </g>

  <!-- locator code chip -->
  <g transform="translate(740,250)">
    <rect x="0" y="0" width="380" height="130" rx="12" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <text x="24" y="42" font-family="monospace" font-size="17" fill="#c4b5fd">getByRole(</text>
    <text x="24" y="72" font-family="monospace" font-size="17" fill="#86efac">  'button',</text>
    <text x="24" y="102" font-family="monospace" font-size="17" fill="#fde68a">  { name: 'Đăng nhập' })</text>
  </g>
</svg>
