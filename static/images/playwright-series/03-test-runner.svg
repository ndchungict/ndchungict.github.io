<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#022c22"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.05" fill="white">
    <circle cx="120" cy="120" r="3"/><circle cx="320" cy="120" r="3"/><circle cx="520" cy="120" r="3"/>
    <circle cx="720" cy="120" r="3"/><circle cx="920" cy="120" r="3"/><circle cx="1080" cy="120" r="3"/>
    <circle cx="120" cy="510" r="3"/><circle cx="320" cy="510" r="3"/><circle cx="520" cy="510" r="3"/>
    <circle cx="720" cy="510" r="3"/><circle cx="920" cy="510" r="3"/><circle cx="1080" cy="510" r="3"/>
  </g>

  <!-- workflow: describe → test → expect -->
  <g font-family="monospace" text-anchor="middle">
    <rect x="120" y="260" width="240" height="110" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <text x="240" y="305" font-size="24" fill="rgba(255,255,255,0.9)">test.describe</text>
    <text x="240" y="338" font-size="16" fill="rgba(255,255,255,0.5)">nhóm test</text>

    <rect x="480" y="260" width="240" height="110" rx="12" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.55)" stroke-width="2.5"/>
    <text x="600" y="305" font-size="24" fill="rgba(255,255,255,0.95)">test()</text>
    <text x="600" y="338" font-size="16" fill="rgba(255,255,255,0.5)">một kịch bản</text>

    <rect x="840" y="260" width="240" height="110" rx="12" fill="rgba(74,222,128,0.18)" stroke="#4ade80" stroke-width="2.5"/>
    <text x="960" y="305" font-size="24" fill="#bbf7d0">expect()</text>
    <text x="960" y="338" font-size="16" fill="rgba(255,255,255,0.55)">kiểm chứng</text>
  </g>
  <!-- arrows -->
  <g stroke="rgba(255,255,255,0.45)" stroke-width="3" fill="none">
    <path d="M 360 315 L 470 315"/>
    <path d="M 720 315 L 830 315"/>
  </g>
  <polygon points="470,315 458,309 458,321" fill="rgba(255,255,255,0.45)"/>
  <polygon points="830,315 818,309 818,321" fill="rgba(255,255,255,0.45)"/>

  <!-- hooks row -->
  <g font-family="monospace" font-size="15" fill="rgba(255,255,255,0.5)" text-anchor="middle">
    <rect x="200" y="150" width="160" height="40" rx="8" fill="rgba(255,255,255,0.08)"/>
    <text x="280" y="175">beforeEach</text>
    <rect x="840" y="150" width="160" height="40" rx="8" fill="rgba(255,255,255,0.08)"/>
    <text x="920" y="175">afterEach</text>
  </g>
</svg>
