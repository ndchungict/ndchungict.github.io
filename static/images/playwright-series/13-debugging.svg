<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f0a2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.05" stroke="white" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/><line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- trace viewer window -->
  <g transform="translate(180,130)">
    <rect x="0" y="0" width="840" height="370" rx="14" fill="rgba(0,0,0,0.32)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <rect x="0" y="0" width="840" height="40" rx="14" fill="rgba(255,255,255,0.1)"/>
    <circle cx="26" cy="20" r="7" fill="#fca5a5"/><circle cx="50" cy="20" r="7" fill="#fde68a"/><circle cx="74" cy="20" r="7" fill="#86efac"/>
    <text x="420" y="26" font-family="monospace" font-size="15" fill="rgba(255,255,255,0.6)" text-anchor="middle">Trace Viewer</text>

    <!-- timeline filmstrip -->
    <g>
      <rect x="30" y="60" width="110" height="70" rx="6" fill="rgba(255,255,255,0.12)"/>
      <rect x="155" y="60" width="110" height="70" rx="6" fill="rgba(255,255,255,0.12)"/>
      <rect x="280" y="60" width="110" height="70" rx="6" fill="rgba(96,165,250,0.3)" stroke="#60a5fa" stroke-width="2"/>
      <rect x="405" y="60" width="110" height="70" rx="6" fill="rgba(255,255,255,0.12)"/>
      <rect x="530" y="60" width="110" height="70" rx="6" fill="rgba(255,255,255,0.12)"/>
      <rect x="655" y="60" width="110" height="70" rx="6" fill="rgba(255,255,255,0.12)"/>
    </g>

    <!-- action list (left) -->
    <g font-family="monospace" font-size="14" fill="rgba(255,255,255,0.7)">
      <rect x="30" y="155" width="360" height="30" rx="5" fill="rgba(255,255,255,0.06)"/>
      <text x="45" y="175">▸ goto('/login')</text>
      <rect x="30" y="192" width="360" height="30" rx="5" fill="rgba(96,165,250,0.18)"/>
      <text x="45" y="212" fill="#bfdbfe">▸ fill('Email')</text>
      <rect x="30" y="229" width="360" height="30" rx="5" fill="rgba(255,255,255,0.06)"/>
      <text x="45" y="249">▸ click('Đăng nhập')</text>
      <rect x="30" y="266" width="360" height="30" rx="5" fill="rgba(248,113,113,0.18)"/>
      <text x="45" y="286" fill="#fecaca">✕ expect(...).toBeVisible</text>
    </g>

    <!-- snapshot pane (right) -->
    <rect x="410" y="155" width="400" height="190" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <rect x="430" y="175" width="180" height="16" rx="4" fill="rgba(255,255,255,0.3)"/>
    <rect x="430" y="205" width="360" height="10" rx="5" fill="rgba(255,255,255,0.15)"/>
    <rect x="430" y="225" width="320" height="10" rx="5" fill="rgba(255,255,255,0.15)"/>
    <rect x="430" y="270" width="120" height="40" rx="6" fill="rgba(96,165,250,0.4)"/>
  </g>
</svg>
