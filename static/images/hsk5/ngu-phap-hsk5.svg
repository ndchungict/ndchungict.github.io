<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle dot grid texture -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="white"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Three 田字格 practice cells, each with a key grammar character -->
  <g font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif" font-weight="700" fill="rgba(255,255,255,0.95)" text-anchor="middle" dominant-baseline="middle">
    <!-- cell 1: 宁 -->
    <rect x="200" y="195" width="240" height="240" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.55)" stroke-width="4"/>
    <line x1="320" y1="195" x2="320" y2="435" stroke="rgba(255,255,255,0.30)" stroke-width="2" stroke-dasharray="10 9"/>
    <line x1="200" y1="315" x2="440" y2="315" stroke="rgba(255,255,255,0.30)" stroke-width="2" stroke-dasharray="10 9"/>
    <line x1="200" y1="195" x2="440" y2="435" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="9 11"/>
    <line x1="440" y1="195" x2="200" y2="435" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="9 11"/>
    <text x="320" y="325" font-size="170">宁</text>

    <!-- cell 2: 难 -->
    <rect x="480" y="195" width="240" height="240" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.55)" stroke-width="4"/>
    <line x1="600" y1="195" x2="600" y2="435" stroke="rgba(255,255,255,0.30)" stroke-width="2" stroke-dasharray="10 9"/>
    <line x1="480" y1="315" x2="720" y2="315" stroke="rgba(255,255,255,0.30)" stroke-width="2" stroke-dasharray="10 9"/>
    <line x1="480" y1="195" x2="720" y2="435" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="9 11"/>
    <line x1="720" y1="195" x2="480" y2="435" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="9 11"/>
    <text x="600" y="325" font-size="170">难</text>

    <!-- cell 3: 凡 -->
    <rect x="760" y="195" width="240" height="240" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.55)" stroke-width="4"/>
    <line x1="880" y1="195" x2="880" y2="435" stroke="rgba(255,255,255,0.30)" stroke-width="2" stroke-dasharray="10 9"/>
    <line x1="760" y1="315" x2="1000" y2="315" stroke="rgba(255,255,255,0.30)" stroke-width="2" stroke-dasharray="10 9"/>
    <line x1="760" y1="195" x2="1000" y2="435" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="9 11"/>
    <line x1="1000" y1="195" x2="760" y2="435" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="9 11"/>
    <text x="880" y="325" font-size="170">凡</text>
  </g>

  <!-- brush-dot accents -->
  <circle cx="150" cy="120" r="10" fill="rgba(255,255,255,0.22)"/>
  <circle cx="1060" cy="500" r="13" fill="rgba(255,255,255,0.18)"/>
  <circle cx="120" cy="520" r="7" fill="rgba(255,255,255,0.20)"/>
</svg>
