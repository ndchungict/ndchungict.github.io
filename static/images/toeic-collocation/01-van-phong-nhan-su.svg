<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.05" stroke="white" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/><line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- calendar / schedule -->
  <g transform="translate(200,180)">
    <rect x="0" y="0" width="260" height="230" rx="16" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.45)" stroke-width="2.5"/>
    <rect x="0" y="0" width="260" height="50" rx="16" fill="rgba(255,255,255,0.25)"/>
    <rect x="40" y="-14" width="14" height="34" rx="5" fill="rgba(255,255,255,0.7)"/>
    <rect x="206" y="-14" width="14" height="34" rx="5" fill="rgba(255,255,255,0.7)"/>
    <g fill="rgba(255,255,255,0.35)">
      <rect x="30" y="78" width="40" height="32" rx="5"/><rect x="90" y="78" width="40" height="32" rx="5"/>
      <rect x="150" y="78" width="40" height="32" rx="5"/><rect x="210" y="78" width="20" height="32" rx="5"/>
      <rect x="30" y="124" width="40" height="32" rx="5"/>
      <rect x="90" y="124" width="40" height="32" rx="5" fill="#60a5fa"/>
      <rect x="150" y="124" width="40" height="32" rx="5"/><rect x="210" y="124" width="20" height="32" rx="5"/>
      <rect x="30" y="170" width="40" height="32" rx="5"/><rect x="90" y="170" width="40" height="32" rx="5"/>
      <rect x="150" y="170" width="40" height="32" rx="5"/>
    </g>
  </g>

  <!-- people / team -->
  <g transform="translate(640,210)" fill="rgba(255,255,255,0.5)">
    <circle cx="80" cy="40" r="34"/><rect x="34" y="86" width="92" height="80" rx="30"/>
    <circle cx="210" cy="30" r="28" fill="rgba(255,255,255,0.4)"/><rect x="172" y="68" width="76" height="68" rx="26" fill="rgba(255,255,255,0.4)"/>
    <circle cx="320" cy="40" r="34" fill="#93c5fd"/><rect x="274" y="86" width="92" height="80" rx="30" fill="#93c5fd"/>
  </g>
  <!-- briefcase -->
  <g transform="translate(740,400)">
    <rect x="0" y="20" width="140" height="90" rx="12" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <rect x="48" y="2" width="44" height="26" rx="8" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>
    <line x1="0" y1="58" x2="140" y2="58" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  </g>
</svg>
