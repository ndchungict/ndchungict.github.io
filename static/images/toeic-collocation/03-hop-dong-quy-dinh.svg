      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.05" stroke="white" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/><line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- contract document -->
  <g transform="translate(330,140)">
    <rect x="0" y="0" width="280" height="350" rx="14" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.5)" stroke-width="2.5"/>
    <rect x="36" y="40" width="160" height="20" rx="6" fill="rgba(255,255,255,0.55)"/>
