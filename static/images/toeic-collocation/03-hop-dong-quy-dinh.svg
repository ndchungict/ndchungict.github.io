      <rect x="36" y="126" width="160" height="11" rx="5"/>
      <rect x="36" y="166" width="208" height="11" rx="5"/><rect x="36" y="186" width="180" height="11" rx="5"/>
      <rect x="36" y="206" width="208" height="11" rx="5"/>
    </g>
    <!-- signature line -->
    <line x1="36" y1="280" x2="180" y2="280" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <path d="M 44 274 q 14 -16 26 0 q 12 14 26 -2 q 10 -10 22 2" fill="none" stroke="#c4b5fd" stroke-width="3"/>
