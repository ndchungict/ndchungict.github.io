<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.05" stroke="white" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/><line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- verb pattern formula cards -->
  <g font-family="monospace" text-anchor="middle">
    <rect x="170" y="240" width="260" height="100" rx="14" fill="rgba(148,163,184,0.2)" stroke="rgba(226,232,240,0.6)" stroke-width="2"/>
    <text x="300" y="300" font-size="30" fill="#e2e8f0">V + to V</text>

    <rect x="470" y="190" width="260" height="100" rx="14" fill="rgba(96,165,250,0.22)" stroke="#60a5fa" stroke-width="2.5"/>
    <text x="600" y="250" font-size="30" fill="#bfdbfe">V + V-ing</text>

    <rect x="470" y="320" width="260" height="100" rx="14" fill="rgba(148,163,184,0.2)" stroke="rgba(226,232,240,0.6)" stroke-width="2"/>
    <text x="600" y="380" font-size="26" fill="#e2e8f0">V + sb + to V</text>

    <rect x="770" y="240" width="260" height="100" rx="14" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="2.5"/>
    <text x="900" y="300" font-size="28" fill="#a7f3d0">be + adj + to V</text>
  </g>

  <!-- connecting arrows -->
  <g stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none">
    <path d="M 430 290 L 465 250"/>
    <path d="M 430 300 L 465 370"/>
    <path d="M 730 240 L 765 280"/>
  </g>
</svg>
