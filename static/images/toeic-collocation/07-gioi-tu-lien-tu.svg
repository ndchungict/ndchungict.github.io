<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#1c0a00"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.05" stroke="white" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/><line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- two word-blocks connected by a bridge (preposition) -->
  <g font-family="monospace" text-anchor="middle">
    <rect x="120" y="270" width="200" height="100" rx="14" fill="rgba(251,191,36,0.18)" stroke="#fbbf24" stroke-width="2.5"/>
    <text x="220" y="332" font-size="26" fill="#fde68a">word A</text>

    <rect x="880" y="270" width="200" height="100" rx="14" fill="rgba(251,191,36,0.18)" stroke="#fbbf24" stroke-width="2.5"/>
    <text x="980" y="332" font-size="26" fill="#fde68a">word B</text>

    <!-- bridge -->
    <path d="M 320 320 C 480 200 720 200 880 320" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="4"/>
    <rect x="540" y="210" width="120" height="56" rx="12" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <text x="600" y="247" font-size="22" fill="rgba(255,255,255,0.9)">prep</text>
  </g>

  <!-- degree gauge below -->
  <g transform="translate(440,440)">
    <line x1="0" y1="0" x2="320" y2="0" stroke="rgba(255,255,255,0.25)" stroke-width="8" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="230" y2="0" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
    <circle cx="230" cy="0" r="13" fill="#fde68a"/>
    <text x="160" y="44" font-family="monospace" font-size="16" fill="rgba(255,255,255,0.45)" text-anchor="middle">approximately · nearly · up to</text>
  </g>
</svg>
