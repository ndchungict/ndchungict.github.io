<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#042f2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.05" stroke="white" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/><line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- delivery truck -->
  <g transform="translate(180,260)">
    <rect x="0" y="0" width="200" height="120" rx="10" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <path d="M 200 30 L 280 30 L 320 80 L 320 120 L 200 120 Z" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <rect x="212" y="44" width="56" height="34" rx="4" fill="rgba(255,255,255,0.3)"/>
    <circle cx="60" cy="135" r="26" fill="#0e7490" stroke="rgba(255,255,255,0.7)" stroke-width="6"/>
    <circle cx="265" cy="135" r="26" fill="#0e7490" stroke="rgba(255,255,255,0.7)" stroke-width="6"/>
  </g>

  <!-- map pin location -->
  <g transform="translate(640,180)">
    <path d="M 90 0 C 40 0 0 40 0 90 C 0 150 90 230 90 230 C 90 230 180 150 180 90 C 180 40 140 0 90 0 Z" fill="rgba(94,234,212,0.3)" stroke="#5eead4" stroke-width="3"/>
    <circle cx="90" cy="88" r="38" fill="rgba(255,255,255,0.85)"/>
    <circle cx="90" cy="88" r="20" fill="#0e7490"/>
  </g>

  <!-- package box -->
  <g transform="translate(900,360)">
    <path d="M 0 30 L 80 0 L 160 30 L 80 60 Z" fill="rgba(255,255,255,0.25)"/>
    <path d="M 0 30 L 0 120 L 80 150 L 80 60 Z" fill="rgba(255,255,255,0.16)"/>
    <path d="M 160 30 L 160 120 L 80 150 L 80 60 Z" fill="rgba(255,255,255,0.1)"/>
    <line x1="80" y1="60" x2="80" y2="150" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  </g>
</svg>
