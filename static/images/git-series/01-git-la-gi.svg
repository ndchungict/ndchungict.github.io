<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.08">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="white"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Network connections (lines first, behind nodes) -->
  <!-- Center to level 1 nodes -->
  <line x1="600" y1="315" x2="260" y2="165" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <line x1="600" y1="315" x2="940" y2="165" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <line x1="600" y1="315" x2="160" y2="390" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <line x1="600" y1="315" x2="1040" y2="390" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <line x1="600" y1="315" x2="460" y2="500" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <line x1="600" y1="315" x2="740" y2="500" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <!-- Level 1 to level 2 nodes -->
  <line x1="260" y1="165" x2="110" y2="105" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="260" y1="165" x2="270" y2="60" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="940" y1="165" x2="1090" y2="105" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="940" y1="165" x2="930" y2="60" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="160" y1="390" x2="80" y2="520" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="1040" y1="390" x2="1120" y2="520" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- Cross connections -->
  <line x1="260" y1="165" x2="460" y2="500" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="940" y1="165" x2="740" y2="500" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Central hub -->
  <circle cx="600" cy="315" r="52" fill="rgba(255,255,255,0.12)"/>
  <circle cx="600" cy="315" r="36" fill="rgba(255,255,255,0.9)"/>
  <circle cx="600" cy="315" r="18" fill="#ea580c"/>

  <!-- Level 1 nodes -->
  <circle cx="260" cy="165" r="26" fill="rgba(255,255,255,0.18)"/>
  <circle cx="260" cy="165" r="18" fill="rgba(255,255,255,0.82)"/>
  <circle cx="940" cy="165" r="26" fill="rgba(255,255,255,0.18)"/>
  <circle cx="940" cy="165" r="18" fill="rgba(255,255,255,0.82)"/>
  <circle cx="160" cy="390" r="22" fill="rgba(255,255,255,0.18)"/>
  <circle cx="160" cy="390" r="15" fill="rgba(255,255,255,0.78)"/>
  <circle cx="1040" cy="390" r="22" fill="rgba(255,255,255,0.18)"/>
  <circle cx="1040" cy="390" r="15" fill="rgba(255,255,255,0.78)"/>
  <circle cx="460" cy="500" r="20" fill="rgba(255,255,255,0.18)"/>
  <circle cx="460" cy="500" r="13" fill="rgba(255,255,255,0.75)"/>
  <circle cx="740" cy="500" r="20" fill="rgba(255,255,255,0.18)"/>
  <circle cx="740" cy="500" r="13" fill="rgba(255,255,255,0.75)"/>

  <!-- Level 2 nodes -->
  <circle cx="110" cy="105" r="13" fill="rgba(255,255,255,0.55)"/>
  <circle cx="270" cy="60" r="11" fill="rgba(255,255,255,0.45)"/>
  <circle cx="1090" cy="105" r="13" fill="rgba(255,255,255,0.55)"/>
  <circle cx="930" cy="60" r="11" fill="rgba(255,255,255,0.45)"/>
  <circle cx="80" cy="520" r="10" fill="rgba(255,255,255,0.4)"/>
  <circle cx="1120" cy="520" r="10" fill="rgba(255,255,255,0.4)"/>
</svg>
