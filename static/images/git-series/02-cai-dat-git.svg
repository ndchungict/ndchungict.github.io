  <text x="845" y="71" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">bash — git config</text>
  <text x="720" y="116" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff">$ git config --global user.name "Nguyen Chung"</text>
  <text x="720" y="144" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff">$ git config --global user.email "dev@gmail.com"</text>
  <text x="720" y="172" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff">$ git config --global core.editor "code --wait"</text>
  <text x="720" y="208" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff">$ git config --list</text>
