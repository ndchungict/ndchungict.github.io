  <text x="60" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="60" fill="#ffffff" font-weight="bold">Git Cơ Bản</text>
  <text x="60" y="260" font-family="'Segoe UI', Arial, sans-serif" font-size="32" fill="#8b949e">init · add · commit</text>
  <text x="60" y="305" font-family="'Segoe UI', Arial, sans-serif" font-size="32" fill="#8b949e">status · log · diff</text>
