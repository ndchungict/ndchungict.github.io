<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#022c22"/>
    </linearGradient>
    <linearGradient id="box1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.14)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.06)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle pattern -->
  <g opacity="0.04">
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="60" height="60" fill="none" stroke="white" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>

  <!-- Three workflow boxes -->
  <!-- Box 1: Working Directory -->
  <rect x="100" y="195" width="260" height="240" rx="12" fill="url(#box1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Icon: pencil/edit -->
  <g transform="translate(180, 255)">
    <rect x="0" y="0" width="100" height="70" rx="6" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <line x1="14" y1="20" x2="86" y2="20" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
    <line x1="14" y1="35" x2="70" y2="35" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
    <line x1="14" y1="50" x2="56" y2="50" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
  </g>
  <text x="230" y="355" font-family="sans-serif" font-size="15" fill="rgba(255,255,255,0.55)" text-anchor="middle">Working</text>
  <text x="230" y="374" font-family="sans-serif" font-size="15" fill="rgba(255,255,255,0.55)" text-anchor="middle">Directory</text>
  <text x="230" y="408" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.35)" text-anchor="middle">untracked / modified</text>

  <!-- Arrow 1 -->
  <g transform="translate(360, 315)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="6,4"/>
    <polygon points="80,0 68,-6 68,6" fill="rgba(255,255,255,0.4)"/>
    <text x="40" y="-14" font-family="monospace" font-size="13" fill="#4ade80" text-anchor="middle">git add</text>
  </g>

  <!-- Box 2: Staging Area -->
  <rect x="470" y="195" width="260" height="240" rx="12" fill="url(#box1)" stroke="rgba(255,255,255,0.28)" stroke-width="1.5"/>
  <!-- Icon: checklist -->
  <g transform="translate(550, 255)">
    <rect x="0" y="0" width="100" height="70" rx="6" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2"/>
    <text x="18" y="24" font-family="monospace" font-size="14" fill="#4ade80">✓</text>
    <line x1="36" y1="20" x2="84" y2="20" stroke="rgba(255,255,255,0.45)" stroke-width="2"/>
    <text x="18" y="44" font-family="monospace" font-size="14" fill="#4ade80">✓</text>
    <line x1="36" y1="40" x2="84" y2="40" stroke="rgba(255,255,255,0.45)" stroke-width="2"/>
    <text x="18" y="64" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.3)">○</text>
    <line x1="36" y1="60" x2="78" y2="60" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  </g>
  <text x="600" y="355" font-family="sans-serif" font-size="15" fill="rgba(255,255,255,0.55)" text-anchor="middle">Staging</text>
  <text x="600" y="374" font-family="sans-serif" font-size="15" fill="rgba(255,255,255,0.55)" text-anchor="middle">Area</text>
  <text x="600" y="408" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.35)" text-anchor="middle">staged</text>

  <!-- Arrow 2 -->
  <g transform="translate(730, 315)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="6,4"/>
    <polygon points="80,0 68,-6 68,6" fill="rgba(255,255,255,0.4)"/>
    <text x="40" y="-14" font-family="monospace" font-size="13" fill="#4ade80" text-anchor="middle">git commit</text>
  </g>

  <!-- Box 3: Repository -->
  <rect x="840" y="195" width="260" height="240" rx="12" fill="url(#box1)" stroke="rgba(255,255,255,0.38)" stroke-width="1.5"/>
  <!-- Icon: stack of commits -->
  <g transform="translate(900, 248)">
    <rect x="0" y="0" width="140" height="22" rx="4" fill="rgba(255,255,255,0.55)"/>
    <rect x="0" y="28" width="140" height="22" rx="4" fill="rgba(255,255,255,0.38)"/>
    <rect x="0" y="56" width="140" height="22" rx="4" fill="rgba(255,255,255,0.22)"/>
    <text x="8" y="16" font-family="monospace" font-size="11" fill="#065f46">a1b2c3d  feat: ...</text>
    <text x="8" y="44" font-family="monospace" font-size="11" fill="rgba(0,60,30,0.7)">e4f5g6h  fix: ...</text>
    <text x="8" y="72" font-family="monospace" font-size="11" fill="rgba(0,60,30,0.5)">i7j8k9l  init: ...</text>
  </g>
  <text x="970" y="355" font-family="sans-serif" font-size="15" fill="rgba(255,255,255,0.55)" text-anchor="middle">Repository</text>
  <text x="970" y="408" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.35)" text-anchor="middle">committed</text>
</svg>
