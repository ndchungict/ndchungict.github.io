  <text x="855" y="71" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">bash — my-project</text>
  <text x="700" y="116" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff">$ git init</text>
  <text x="700" y="140" font-family="'Courier New', monospace" font-size="13" fill="#8b949e">Initialized empty Git repository in ./my-project</text>
  <text x="700" y="172" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff">$ git add index.html style.css</text>
  <text x="700" y="204" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff">$ git status</text>
  <text x="700" y="228" font-family="'Courier New', monospace" font-size="13" fill="#8b949e">Changes to be committed:</text>
  <text x="700" y="252" font-family="'Courier New', monospace" font-size="13" fill="#238636">  new file: index.html</text>
  <text x="700" y="276" font-family="'Courier New', monospace" font-size="13" fill="#238636">  new file: style.css</text>
  <text x="700" y="308" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff">$ git commit -m "feat: khởi tạo dự án"</text>
  <text x="700" y="332" font-family="'Courier New', monospace" font-size="13" fill="#8b949e">[main a1b2c3d] feat: khởi tạo dự án</text>
  <text x="700" y="360" font-family="'Courier New', monospace" font-size="16" fill="#58a6ff">█</text>
