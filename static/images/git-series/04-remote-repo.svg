<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Stars background -->
  <g fill="white">
    <circle cx="120" cy="80" r="1.5" opacity="0.4"/>
    <circle cx="280" cy="140" r="1" opacity="0.3"/>
    <circle cx="450" cy="60" r="1.5" opacity="0.5"/>
    <circle cx="700" cy="90" r="1" opacity="0.35"/>
    <circle cx="900" cy="50" r="2" opacity="0.4"/>
    <circle cx="1050" cy="110" r="1.5" opacity="0.3"/>
    <circle cx="1150" cy="70" r="1" opacity="0.45"/>
    <circle cx="180" cy="550" r="1.5" opacity="0.3"/>
    <circle cx="380" cy="580" r="1" opacity="0.4"/>
    <circle cx="1000" cy="560" r="1.5" opacity="0.35"/>
    <circle cx="80" cy="300" r="1" opacity="0.3"/>
    <circle cx="1100" cy="280" r="1.5" opacity="0.3"/>
  </g>

  <!-- Cloud shape (Remote) at top -->
  <g transform="translate(600, 160)">
    <!-- Cloud body -->
    <ellipse cx="0" cy="20" rx="130" ry="55" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <ellipse cx="-75" cy="30" rx="70" ry="45" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <ellipse cx="75" cy="30" rx="70" ry="45" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <!-- Mask out bottom -->
    <rect x="-210" y="40" width="420" height="60" fill="#5b21b6" opacity="0"/>
    <!-- GitHub icon hint -->
    <text x="0" y="28" font-family="monospace" font-size="22" fill="rgba(255,255,255,0.7)" text-anchor="middle">origin / remote</text>
  </g>

  <!-- Push arrow (left) -->
  <g transform="translate(380, 330)">
    <line x1="0" y1="60" x2="0" y2="-60" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-dasharray="8,5"/>
    <polygon points="0,-60 -7,-44 7,-44" fill="rgba(255,255,255,0.35)"/>
    <rect x="-50" y="-12" width="100" height="24" rx="4" fill="rgba(255,255,255,0.08)"/>
    <text x="0" y="5" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">git push</text>
  </g>

  <!-- Pull arrow (right) -->
  <g transform="translate(820, 330)">
    <line x1="0" y1="-60" x2="0" y2="60" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-dasharray="8,5"/>
    <polygon points="0,60 -7,44 7,44" fill="rgba(255,255,255,0.35)"/>
    <rect x="-50" y="-12" width="100" height="24" rx="4" fill="rgba(255,255,255,0.08)"/>
    <text x="0" y="5" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">git pull</text>
  </g>

  <!-- Local machine (laptop shape) at bottom -->
  <g transform="translate(600, 460)">
    <!-- Screen -->
    <rect x="-160" y="-90" width="320" height="180" rx="10" fill="url(#card)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <!-- Screen bezel -->
    <rect x="-145" y="-78" width="290" height="148" rx="6" fill="rgba(0,0,0,0.3)"/>
    <!-- Code lines in screen -->
    <line x1="-120" y1="-50" x2="20" y2="-50" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-120" y1="-30" x2="60" y2="-30" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-120" y1="-10" x2="-20" y2="-10" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-120" y1="10" x2="40" y2="10" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-120" y1="30" x2="10" y2="30" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round"/>
    <!-- Status dot green -->
    <circle cx="100" cy="-55" r="6" fill="#4ade80" opacity="0.8"/>
    <!-- Base -->
    <rect x="-185" y="90" width="370" height="14" rx="7" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  </g>
</svg>
