  <text x="855" y="71" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">bash — git remote</text>
  <text x="700" y="116" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff">$ git clone git@github.com:user/repo.git</text>
  <text x="700" y="140" font-family="'Courier New', monospace" font-size="13" fill="#8b949e">Cloning into 'repo'...</text>
  <text x="700" y="172" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff">$ git remote -v</text>
  <text x="700" y="196" font-family="'Courier New', monospace" font-size="13" fill="#8b949e">origin  git@github.com:user/repo.git (fetch)</text>
  <text x="700" y="220" font-family="'Courier New', monospace" font-size="13" fill="#8b949e">origin  git@github.com:user/repo.git (push)</text>
  <text x="700" y="256" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff">$ git push origin main</text>
  <text x="700" y="280" font-family="'Courier New', monospace" font-size="13" fill="#8b949e">Enumerating objects: 5, done.</text>
  <text x="700" y="304" font-family="'Courier New', monospace" font-size="13" fill="#238636">To github.com:user/repo.git</text>
  <text x="700" y="328" font-family="'Courier New', monospace" font-size="13" fill="#238636">   a1b2c3d..e4f5g6h  main -&gt; main</text>
  <text x="700" y="360" font-family="'Courier New', monospace" font-size="16" fill="#58a6ff">█</text>
  <rect x="60" y="56" width="210" height="34" rx="17" fill="none" stroke="#f05032" stroke-width="1.5"/>
  <text x="165" y="78" font-family="'Courier New', monospace" font-size="13" fill="#f05032" text-anchor="middle" font-weight="bold">Series Git · Bài 04/08</text>
  <text x="60" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="55" fill="#ffffff" font-weight="bold">Remote Repository</text>
  <text x="60" y="260" font-family="'Segoe UI', Arial, sans-serif" font-size="32" fill="#8b949e">clone · push · pull · fetch</text>
  <text x="60" y="305" font-family="'Segoe UI', Arial, sans-serif" font-size="32" fill="#8b949e">GitHub · GitLab · Bitbucket</text>
