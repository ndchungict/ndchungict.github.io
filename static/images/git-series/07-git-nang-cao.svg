<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(99,102,241,0.3)"/>
      <stop offset="100%" stop-color="rgba(99,102,241,0.1)"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(236,72,153,0.3)"/>
      <stop offset="100%" stop-color="rgba(236,72,153,0.1)"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(245,158,11,0.3)"/>
      <stop offset="100%" stop-color="rgba(245,158,11,0.1)"/>
    </linearGradient>
    <linearGradient id="card4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(16,185,129,0.3)"/>
      <stop offset="100%" stop-color="rgba(16,185,129,0.1)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot pattern -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="white"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Stash card -->
  <g transform="translate(0, -30)">
    <rect x="200" y="130" width="800" height="68" rx="8" fill="url(#card1)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
    <text x="240" y="158" font-family="monospace" font-size="14" fill="rgba(99,102,241,0.9)">stash</text>
    <text x="320" y="158" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.5)">·  Lưu tạm thay đổi chưa commit</text>
    <text x="240" y="182" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.25)">git stash push -m "WIP: đang làm..."  →  git stash pop</text>
  </g>

  <!-- Cherry-pick card -->
  <g transform="translate(0, 20)">
    <rect x="200" y="220" width="800" height="68" rx="8" fill="url(#card2)" stroke="rgba(236,72,153,0.4)" stroke-width="1"/>
    <text x="240" y="248" font-family="monospace" font-size="14" fill="rgba(236,72,153,0.9)">cherry-pick</text>
    <text x="370" y="248" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.5)">·  Chọn commit cụ thể</text>
    <text x="240" y="272" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.25)">git cherry-pick a1b2c3d</text>
  </g>

  <!-- Reset card -->
  <g transform="translate(0, 70)">
    <rect x="200" y="310" width="800" height="68" rx="8" fill="url(#card3)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
    <text x="240" y="338" font-family="monospace" font-size="14" fill="rgba(245,158,11,0.9)">reset</text>
    <text x="310" y="338" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.5)">·  Quay về commit cũ hơn</text>
    <text x="240" y="362" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.25)">--soft  |  --mixed  |  --hard</text>
  </g>

  <!-- Reflog card -->
  <g transform="translate(0, 120)">
    <rect x="200" y="400" width="800" height="68" rx="8" fill="url(#card4)" stroke="rgba(16,185,129,0.4)" stroke-width="1"/>
    <text x="240" y="428" font-family="monospace" font-size="14" fill="rgba(16,185,129,0.9)">reflog</text>
    <text x="318" y="428" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.5)">·  Khôi phục mọi thứ</text>
    <text x="240" y="452" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.25)">git reflog  →  git checkout HEAD@{n}</text>
  </g>

  <!-- Connecting line on left -->
  <line x1="190" y1="168" x2="190" y2="518" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <circle cx="190" cy="168" r="4" fill="rgba(99,102,241,0.6)"/>
  <circle cx="190" cy="258" r="4" fill="rgba(236,72,153,0.6)"/>
  <circle cx="190" cy="348" r="4" fill="rgba(245,158,11,0.6)"/>
  <circle cx="190" cy="438" r="4" fill="rgba(16,185,129,0.6)"/>
</svg>
