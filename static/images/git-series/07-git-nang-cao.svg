  <text x="855" y="71" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">bash — git advanced</text>
  <text x="700" y="116" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff">$ git stash push -m "WIP: đang làm login"</text>
  <text x="700" y="140" font-family="'Courier New', monospace" font-size="13" fill="#8b949e">Saved working directory: WIP: đang làm login</text>
  <text x="700" y="172" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff">$ git cherry-pick a1b2c3d</text>
  <text x="700" y="196" font-family="'Courier New', monospace" font-size="13" fill="#8b949e">[main a4b5c6d] Fix: sửa lỗi validation</text>
  <text x="700" y="228" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff">$ git reset --soft HEAD~1</text>
  <text x="700" y="252" font-family="'Courier New', monospace" font-size="13" fill="#8b949e">Unstaged changes after reset:</text>
  <text x="700" y="276" font-family="'Courier New', monospace" font-size="13" fill="#f0e68c">M  src/components/Login.vue</text>
  <text x="700" y="308" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff">$ git reflog</text>
  <text x="700" y="332" font-family="'Courier New', monospace" font-size="13" fill="#f05032">a1b2c3d</text>
  <text x="762" y="332" font-family="'Courier New', monospace" font-size="13" fill="#8b949e"> HEAD@{0}: reset: moving to HEAD~1</text>
  <text x="700" y="380" font-family="'Courier New', monospace" font-size="16" fill="#58a6ff">█</text>
  <rect x="60" y="56" width="210" height="34" rx="17" fill="none" stroke="#f05032" stroke-width="1.5"/>
  <text x="165" y="78" font-family="'Courier New', monospace" font-size="13" fill="#f05032" text-anchor="middle" font-weight="bold">Series Git · Bài 07/08</text>
  <text x="60" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="60" fill="#ffffff" font-weight="bold">Git Nâng Cao</text>
  <text x="60" y="258" font-family="'Segoe UI', Arial, sans-serif" font-size="32" fill="#8b949e">stash · cherry-pick · reset</text>
  <text x="60" y="302" font-family="'Segoe UI', Arial, sans-serif" font-size="32" fill="#8b949e">revert · reflog · bisect</text>
