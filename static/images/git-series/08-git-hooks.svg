<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0d1117"/>
  <rect width="5" height="630" fill="#f05032"/>
  <rect x="680" y="50" width="480" height="380" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="680" y="50" width="480" height="36" rx="8" fill="#21262d"/>
  <rect x="680" y="68" width="480" height="18" fill="#21262d"/>
  <circle cx="702" cy="68" r="6" fill="#ff5f57"/>
  <circle cx="724" cy="68" r="6" fill="#febc2e"/>
  <circle cx="746" cy="68" r="6" fill="#28c840"/>
  <text x="855" y="71" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">.git/hooks/pre-commit</text>
  <text x="700" y="116" font-family="'Courier New', monospace" font-size="12" fill="#8b949e">#!/bin/sh</text>
  <text x="700" y="140" font-family="'Courier New', monospace" font-size="12" fill="#8b949e"># Chạy lint trước khi commit</text>
  <text x="700" y="164" font-family="'Courier New', monospace" font-size="12" fill="#58a6ff">npm run lint</text>
  <text x="700" y="188" font-family="'Courier New', monospace" font-size="12" fill="#f0e68c">if [ $? -ne 0 ]; then</text>
  <text x="700" y="212" font-family="'Courier New', monospace" font-size="12" fill="#8b949e">  echo "❌ Lint failed. Commit cancelled."</text>
  <text x="700" y="236" font-family="'Courier New', monospace" font-size="12" fill="#f0e68c">  exit 1</text>
  <text x="700" y="260" font-family="'Courier New', monospace" font-size="12" fill="#f0e68c">fi</text>
  <text x="700" y="296" font-family="'Courier New', monospace" font-size="12" fill="#58a6ff">$ git config --global alias.st status</text>
  <text x="700" y="320" font-family="'Courier New', monospace" font-size="12" fill="#58a6ff">$ git config --global alias.lg \</text>
  <text x="700" y="344" font-family="'Courier New', monospace" font-size="12" fill="#58a6ff">    "log --oneline --graph --all"</text>
  <text x="700" y="380" font-family="'Courier New', monospace" font-size="12" fill="#8b949e">$ git st  # thay cho git status</text>
  <text x="700" y="404" font-family="'Courier New', monospace" font-size="16" fill="#58a6ff">█</text>
  <rect x="60" y="56" width="210" height="34" rx="17" fill="none" stroke="#f05032" stroke-width="1.5"/>
  <text x="165" y="78" font-family="'Courier New', monospace" font-size="13" fill="#f05032" text-anchor="middle" font-weight="bold">Series Git · Bài 08/08</text>
  <text x="60" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="58" fill="#ffffff" font-weight="bold">Git Hooks &amp;</text>
  <text x="60" y="258" font-family="'Segoe UI', Arial, sans-serif" font-size="58" fill="#ffffff" font-weight="bold">Automation</text>
  <text x="60" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="30" fill="#8b949e">Hooks · Aliases · Husky</text>
  <rect x="60" y="430" width="72" height="30" rx="4" fill="none" stroke="#1d4ed8" stroke-width="1"/>
  <text x="96" y="450" font-family="'Courier New', monospace" font-size="13" fill="#60a5fa" text-anchor="middle">#git</text>
  <rect x="144" y="430" width="90" height="30" rx="4" fill="none" stroke="#1d4ed8" stroke-width="1"/>
  <text x="189" y="450" font-family="'Courier New', monospace" font-size="13" fill="#60a5fa" text-anchor="middle">#devops</text>
  <rect x="0" y="596" width="1200" height="34" fill="#161b22"/>
  <text x="60" y="618" font-family="'Courier New', monospace" font-size="12" fill="#484f58">blog.chungnd.dev</text>
  <text x="1140" y="618" font-family="'Courier New', monospace" font-size="12" fill="#f05032" text-anchor="end">08 / 08</text>
</svg>
