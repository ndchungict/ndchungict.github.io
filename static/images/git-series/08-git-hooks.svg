<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#1c0a00"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(251,191,36,0.0)"/>
      <stop offset="50%" stop-color="rgba(251,191,36,0.6)"/>
      <stop offset="100%" stop-color="rgba(251,191,36,0.0)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle radial glow center -->
  <radialGradient id="centerGlow" cx="50%" cy="50%" r="40%">
    <stop offset="0%" stop-color="rgba(251,191,36,0.08)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#centerGlow)"/>

  <!-- Flow pipeline -->
  <!-- Stage boxes connected by arrows -->

  <!-- git commit trigger -->
  <rect x="80" y="255" width="180" height="120" rx="10" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.35)" stroke-width="1.5"/>
  <text x="170" y="295" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">trigger</text>
  <text x="170" y="318" font-family="monospace" font-size="16" fill="rgba(251,191,36,0.9)" text-anchor="middle">git commit</text>
  <text x="170" y="340" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle">-m "feat: ..."</text>
  <text x="170" y="360" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.25)" text-anchor="middle">● commit-msg</text>

  <!-- Arrow 1 -->
  <line x1="260" y1="315" x2="330" y2="315" stroke="rgba(251,191,36,0.4)" stroke-width="2"/>
  <polygon points="330,315 318,309 318,321" fill="rgba(251,191,36,0.4)"/>

  <!-- Hook: pre-commit -->
  <rect x="330" y="225" width="180" height="180" rx="10" fill="rgba(251,191,36,0.18)" stroke="rgba(251,191,36,0.5)" stroke-width="2"/>
  <text x="420" y="272" font-family="monospace" font-size="12" fill="rgba(251,191,36,0.7)" text-anchor="middle">pre-commit</text>
  <line x1="350" y1="288" x2="490" y2="288" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="360" y="310" font-family="monospace" font-size="12" fill="#4ade80">✓</text>
  <text x="380" y="310" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.5)">lint</text>
  <text x="360" y="332" font-family="monospace" font-size="12" fill="#4ade80">✓</text>
  <text x="380" y="332" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.5)">format</text>
  <text x="360" y="354" font-family="monospace" font-size="12" fill="#4ade80">✓</text>
  <text x="380" y="354" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.5)">type check</text>
  <text x="360" y="376" font-family="monospace" font-size="12" fill="#4ade80">✓</text>
  <text x="380" y="376" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.5)">tests</text>

  <!-- Arrow 2 -->
  <line x1="510" y1="315" x2="580" y2="315" stroke="rgba(251,191,36,0.4)" stroke-width="2"/>
  <polygon points="580,315 568,309 568,321" fill="rgba(251,191,36,0.4)"/>

  <!-- Hook: post-commit -->
  <rect x="580" y="255" width="180" height="120" rx="10" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.3)" stroke-width="1.5"/>
  <text x="670" y="292" font-family="monospace" font-size="12" fill="rgba(251,191,36,0.65)" text-anchor="middle">post-commit</text>
  <text x="670" y="318" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.4)" text-anchor="middle">notify team</text>
  <text x="670" y="340" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle">update changelog</text>
  <text x="670" y="360" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.25)" text-anchor="middle">trigger CI</text>

  <!-- Arrow 3 -->
  <line x1="760" y1="315" x2="830" y2="315" stroke="rgba(251,191,36,0.4)" stroke-width="2"/>
  <polygon points="830,315 818,309 818,321" fill="rgba(251,191,36,0.4)"/>

  <!-- Hook: pre-push -->
  <rect x="830" y="255" width="180" height="120" rx="10" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.3)" stroke-width="1.5"/>
  <text x="920" y="292" font-family="monospace" font-size="12" fill="rgba(251,191,36,0.65)" text-anchor="middle">pre-push</text>
  <text x="920" y="318" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.4)" text-anchor="middle">run test suite</text>
  <text x="920" y="340" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle">build check</text>
  <text x="920" y="360" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.25)" text-anchor="middle">security scan</text>

  <!-- Arrow 4 -->
  <line x1="1010" y1="315" x2="1080" y2="315" stroke="rgba(251,191,36,0.4)" stroke-width="2"/>
  <polygon points="1080,315 1068,309 1068,321" fill="rgba(251,191,36,0.4)"/>

  <!-- Result: push to remote -->
  <rect x="1080" y="270" width="100" height="90" rx="10" fill="rgba(74,222,128,0.15)" stroke="rgba(74,222,128,0.4)" stroke-width="1.5"/>
  <text x="1130" y="308" font-family="monospace" font-size="13" fill="#4ade80" text-anchor="middle">push</text>
  <text x="1130" y="330" font-family="monospace" font-size="20" fill="#4ade80" text-anchor="middle">✓</text>
  <text x="1130" y="350" font-family="monospace" font-size="11" fill="rgba(74,222,128,0.6)" text-anchor="middle">remote</text>

  <!-- Husky label at bottom -->
  <text x="600" y="475" font-family="monospace" font-size="14" fill="rgba(251,191,36,0.3)" text-anchor="middle">Powered by Husky + lint-staged</text>
  <rect x="340" y="488" width="520" height="2" rx="1" fill="url(#flow)"/>
</svg>
