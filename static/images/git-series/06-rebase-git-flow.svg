<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f0a2e"/>
    </linearGradient>
    <marker id="arrowW" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="rgba(255,255,255,0.5)"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ade80"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Label: Before -->
  <text x="300" y="80" font-family="monospace" font-size="16" fill="rgba(255,255,255,0.4)" text-anchor="middle">Before rebase</text>

  <!-- BEFORE: main branch (top) -->
  <line x1="80" y1="170" x2="560" y2="170" stroke="rgba(255,255,255,0.3)" stroke-width="2.5"/>
  <circle cx="140" cy="170" r="12" fill="rgba(255,255,255,0.15)"/>
  <circle cx="140" cy="170" r="8" fill="rgba(255,255,255,0.8)"/>
  <text x="140" y="148" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">A</text>

  <circle cx="260" cy="170" r="12" fill="rgba(255,255,255,0.15)"/>
  <circle cx="260" cy="170" r="8" fill="rgba(255,255,255,0.8)"/>
  <text x="260" y="148" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">B</text>

  <circle cx="400" cy="170" r="12" fill="rgba(255,255,255,0.15)"/>
  <circle cx="400" cy="170" r="8" fill="rgba(255,255,255,0.8)"/>
  <text x="400" y="148" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">C</text>

  <circle cx="520" cy="170" r="12" fill="rgba(255,255,255,0.15)"/>
  <circle cx="520" cy="170" r="8" fill="rgba(255,255,255,0.8)"/>
  <text x="520" y="148" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">F</text>

  <rect x="58" y="156" width="52" height="18" rx="4" fill="rgba(255,255,255,0.1)"/>
  <text x="84" y="169" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">main</text>

  <!-- BEFORE: feature branch (below main) -->
  <path d="M 260 170 Q 280 170 300 270 L 480 270 Q 500 270 520 270" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <circle cx="340" cy="270" r="11" fill="rgba(255,255,255,0.12)"/>
  <circle cx="340" cy="270" r="7" fill="rgba(255,255,255,0.65)"/>
  <text x="340" y="293" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.4)" text-anchor="middle">D</text>
  <circle cx="460" cy="270" r="11" fill="rgba(255,255,255,0.12)"/>
  <circle cx="460" cy="270" r="7" fill="rgba(255,255,255,0.65)"/>
  <text x="460" y="293" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.4)" text-anchor="middle">E</text>
  <rect x="490" y="258" width="70" height="18" rx="4" fill="rgba(255,255,255,0.08)"/>
  <text x="525" y="271" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.45)" text-anchor="middle">feature</text>

  <!-- Divider -->
  <line x1="640" y1="60" x2="640" y2="570" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="8,6"/>

  <!-- Large curved arrow in center -->
  <path d="M 560 220 Q 600 315 640 315 Q 680 315 720 220" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowW)"/>
  <text x="640" y="340" font-family="monospace" font-size="15" fill="rgba(255,255,255,0.35)" text-anchor="middle">git rebase main</text>

  <!-- Label: After -->
  <text x="920" y="80" font-family="monospace" font-size="16" fill="rgba(255,255,255,0.4)" text-anchor="middle">After rebase</text>

  <!-- AFTER: main stays the same -->
  <line x1="680" y1="170" x2="1120" y2="170" stroke="rgba(255,255,255,0.3)" stroke-width="2.5"/>
  <circle cx="740" cy="170" r="12" fill="rgba(255,255,255,0.15)"/>
  <circle cx="740" cy="170" r="8" fill="rgba(255,255,255,0.8)"/>
  <text x="740" y="148" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">A</text>

  <circle cx="840" cy="170" r="12" fill="rgba(255,255,255,0.15)"/>
  <circle cx="840" cy="170" r="8" fill="rgba(255,255,255,0.8)"/>
  <text x="840" y="148" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">B</text>

  <circle cx="940" cy="170" r="12" fill="rgba(255,255,255,0.15)"/>
  <circle cx="940" cy="170" r="8" fill="rgba(255,255,255,0.8)"/>
  <text x="940" y="148" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">C</text>

  <circle cx="1040" cy="170" r="12" fill="rgba(255,255,255,0.15)"/>
  <circle cx="1040" cy="170" r="8" fill="rgba(255,255,255,0.8)"/>
  <text x="1040" y="148" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">F</text>

  <rect x="718" y="156" width="52" height="18" rx="4" fill="rgba(255,255,255,0.1)"/>
  <text x="744" y="169" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">main</text>

  <!-- AFTER: feature rebased onto main (linear!) -->
  <line x1="1040" y1="170" x2="1120" y2="170" stroke="rgba(255,255,255,0.3)" stroke-width="2.5"/>
  <circle cx="1080" cy="170" r="14" fill="rgba(74,222,128,0.2)"/>
  <circle cx="1080" cy="170" r="9" fill="#4ade80"/>
  <text x="1080" y="148" font-family="monospace" font-size="12" fill="#4ade80" text-anchor="middle">D'</text>

  <!-- Linear arrow showing feature is now linear -->
  <text x="920" y="240" font-family="monospace" font-size="14" fill="rgba(74,222,128,0.7)" text-anchor="middle">✓ linear history</text>

  <!-- Interactive rebase hint at bottom -->
  <rect x="200" y="500" width="800" height="52" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="600" y="522" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.35)" text-anchor="middle">pick · squash · reword · drop · fixup</text>
  <text x="600" y="542" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.2)" text-anchor="middle">git rebase -i HEAD~n</text>
</svg>
