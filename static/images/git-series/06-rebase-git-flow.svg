  <text x="855" y="71" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">bash — git rebase</text>
  <text x="700" y="116" font-family="'Courier New', monospace" font-size="13" fill="#8b949e"># Trước khi rebase</text>
  <text x="700" y="140" font-family="'Courier New', monospace" font-size="13" fill="#238636">main:    A---B---C</text>
  <text x="700" y="164" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff">feature:     \---D---E</text>
  <text x="700" y="200" font-family="'Courier New', monospace" font-size="13" fill="#8b949e"># Sau khi rebase</text>
  <text x="700" y="224" font-family="'Courier New', monospace" font-size="13" fill="#238636">main:    A---B---C</text>
  <text x="700" y="248" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff">feature:         \---D'---E'</text>
  <text x="700" y="284" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff">$ git checkout feature</text>
  <text x="700" y="308" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff">$ git rebase main</text>
  <text x="700" y="332" font-family="'Courier New', monospace" font-size="13" fill="#8b949e">Successfully rebased and updated</text>
  <text x="700" y="356" font-family="'Courier New', monospace" font-size="13" fill="#8b949e">refs/heads/feature.</text>
  <text x="700" y="384" font-family="'Courier New', monospace" font-size="16" fill="#58a6ff">█</text>
