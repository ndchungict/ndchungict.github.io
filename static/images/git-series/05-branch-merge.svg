<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#042f2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle horizontal bands -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.04" stroke="white" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- MAIN BRANCH line -->
  <line x1="80" y1="385" x2="1120" y2="385" stroke="rgba(255,255,255,0.35)" stroke-width="3"/>

  <!-- FEATURE BRANCH curve -->
  <!-- Branch out from commit C, back to commit F -->
  <path d="M 340 385 Q 380 385 420 245 L 780 245 Q 820 245 860 385"
        fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2.5"/>

  <!-- HOTFIX branch (small one below) -->
  <path d="M 600 385 Q 630 385 650 470 L 800 470 Q 820 470 840 385"
        fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

  <!-- Commit dots on MAIN branch -->
  <!-- A -->
  <circle cx="160" cy="385" r="16" fill="rgba(255,255,255,0.15)"/>
  <circle cx="160" cy="385" r="10" fill="rgba(255,255,255,0.85)"/>
  <!-- B -->
  <circle cx="340" cy="385" r="16" fill="rgba(255,255,255,0.15)"/>
  <circle cx="340" cy="385" r="10" fill="rgba(255,255,255,0.85)"/>
  <!-- C (merge point feature) -->
  <circle cx="860" cy="385" r="20" fill="rgba(255,255,255,0.18)"/>
  <circle cx="860" cy="385" r="13" fill="rgba(255,255,255,0.9)"/>
  <!-- D -->
  <circle cx="1040" cy="385" r="16" fill="rgba(255,255,255,0.15)"/>
  <circle cx="1040" cy="385" r="10" fill="rgba(255,255,255,0.85)"/>

  <!-- Commit dots on FEATURE branch -->
  <circle cx="480" cy="245" r="13" fill="rgba(255,255,255,0.18)"/>
  <circle cx="480" cy="245" r="8" fill="rgba(255,255,255,0.75)"/>
  <circle cx="600" cy="245" r="13" fill="rgba(255,255,255,0.18)"/>
  <circle cx="600" cy="245" r="8" fill="rgba(255,255,255,0.75)"/>
  <circle cx="720" cy="245" r="13" fill="rgba(255,255,255,0.18)"/>
  <circle cx="720" cy="245" r="8" fill="rgba(255,255,255,0.75)"/>

  <!-- Commit dots on HOTFIX -->
  <circle cx="680" cy="470" r="10" fill="rgba(255,255,255,0.15)"/>
  <circle cx="680" cy="470" r="6" fill="rgba(255,255,255,0.55)"/>
  <circle cx="770" cy="470" r="10" fill="rgba(255,255,255,0.15)"/>
  <circle cx="770" cy="470" r="6" fill="rgba(255,255,255,0.55)"/>

  <!-- Branch labels -->
  <rect x="60" y="370" width="80" height="24" rx="4" fill="rgba(255,255,255,0.12)"/>
  <text x="100" y="387" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">main</text>

  <rect x="395" y="225" width="130" height="24" rx="4" fill="rgba(255,255,255,0.12)"/>
  <text x="460" y="242" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">feature/login</text>

  <rect x="598" y="488" width="100" height="24" rx="4" fill="rgba(255,255,255,0.1)"/>
  <text x="648" y="505" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">hotfix</text>

  <!-- Merge annotation -->
  <text x="860" y="425" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.45)" text-anchor="middle">merge</text>

  <!-- HEAD indicator -->
  <rect x="1040" y="350" width="62" height="22" rx="4" fill="rgba(255,255,255,0.15)"/>
  <text x="1071" y="366" font-family="monospace" font-size="12" fill="#4ade80" text-anchor="middle">HEAD</text>
  <line x1="1071" y1="372" x2="1071" y2="385" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
</svg>
